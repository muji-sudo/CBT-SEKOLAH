<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT PRO - Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #1e3a8a; }
        body { background: #f8fafc; font-family: 'Inter', sans-serif; }
        .sidebar { background: var(--primary); color: white; min-height: 100vh; width: 260px; position: fixed; z-index: 1000; }
        .content { margin-left: 260px; padding: 30px; }
        .nav-link { color: #cbd5e1; cursor: pointer; padding: 12px 20px; border-radius: 8px; margin: 5px 15px; display: block; text-decoration: none; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.1); color: white; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="p-4 text-center"><h6 class="fw-bold text-white">Administrator CBT</h6></div>
    <nav class="mt-3">
        <a onclick="show('dash')" id="n-dash" class="nav-link active">Monitoring</a>
        <a onclick="show('bank')" id="n-bank" class="nav-link">Bank Soal</a>
        <a onclick="show('siswa')" id="n-siswa" class="nav-link">Data Siswa</a>
        <a onclick="show('set')" id="n-set" class="nav-link">Pengaturan</a>
        <a href="index.html" class="nav-link text-warning">Keluar</a>
    </nav>
</div>

<div class="content">
    <div id="p-bank" class="hidden">
        <h4 class="fw-bold mb-4">Manajemen Soal (Excel)</h4>
        <div class="card p-4">
            <div class="row g-3">
                <div class="col-md-4"><input type="text" id="bs-mapel" class="form-control" placeholder="Mapel"></div>
                <div class="col-md-2"><input type="text" id="bs-kelas" class="form-control" placeholder="Kelas"></div>
                <div class="col-md-2"><input type="number" id="bs-durasi" class="form-control" placeholder="Menit"></div>
                <div class="col-md-2"><input type="date" id="bs-tgl" class="form-control"></div>
                <div class="col-md-2">
                    <select id="bs-show-nilai" class="form-select">
                        <option value="ya">Tampil Nilai</option>
                        <option value="tidak">Sembunyi</option>
                    </select>
                </div>
                <div class="col-md-12">
                    <label class="small fw-bold">Upload Excel (.xlsx)</label>
                    <input type="file" id="bs-file" class="form-control" accept=".xlsx">
                </div>
                <div class="col-12"><button onclick="uploadSoal()" class="btn btn-primary w-100 fw-bold">PROSES & AKTIFKAN</button></div>
            </div>
        </div>
        <div class="card p-0 overflow-hidden"><table class="table mb-0 text-center"><tbody id="t-soal"></tbody></table></div>
    </div>

    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBGl1WySSrPU_86T0SOKi0FhpMdAw8NXLs", databaseURL: "https://cbt-v1-c3387-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function show(p) {
        ['dash','bank','siswa','set'].forEach(i => { document.getElementById('p-'+i).classList.add('hidden'); });
        document.getElementById('p-'+p).classList.remove('hidden');
    }

    function uploadSoal() {
        const f = document.getElementById('bs-file').files[0];
        const m = document.getElementById('bs-mapel').value;
        const t = document.getElementById('bs-tgl').value;
        if(!f || !m || !t) return Swal.fire('Error','Lengkapi data!','error');

        const reader = new FileReader();
        reader.onload = e => {
            const data = new Uint8Array(e.target.result), wb = XLSX.read(data, {type:'array'}), json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            db.ref('bank_soal').push({
                mapel: m, kelas: document.getElementById('bs-kelas').value,
                durasi: document.getElementById('bs-durasi').value, tanggal: t,
                showNilai: document.getElementById('bs-show-nilai').value, soal: json, status: "aktif"
            }).then(() => Swal.fire('Berhasil','Soal diaktifkan','success'));
        };
        reader.readAsArrayBuffer(f);
    }
    // ... Fungsi show data bank soal, siswa, monitoring, dan settings ...
</script>
</body>
</html>
