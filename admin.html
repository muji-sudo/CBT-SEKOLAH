<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT PRO - Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #1e3a8a; }
        body { background: #f8fafc; font-family: 'Inter', sans-serif; }
        .sidebar { background: var(--primary); color: white; min-height: 100vh; width: 260px; position: fixed; z-index: 1000; }
        .content { margin-left: 260px; padding: 30px; }
        .nav-link { color: #cbd5e1; cursor: pointer; padding: 12px 20px; border-radius: 8px; margin: 5px 15px; display: block; text-decoration: none; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.1); color: white; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 20px; }
        .hidden { display: none; }
        .btn-xs { padding: 0.1rem 0.4rem; font-size: 0.75rem; }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="p-4 text-center">
        <div class="bg-warning text-blue-900 d-inline-block px-3 py-1 rounded fw-bold mb-2">CBT PRO</div>
        <h6 id="sidebar-sekolah" class="fw-bold text-white small">Administrator</h6>
    </div>
    <nav class="mt-3">
        <a onclick="show('dash')" id="n-dash" class="nav-link active">📊 Monitoring</a>
        <a onclick="show('hasil')" id="n-hasil" class="nav-link">📝 Hasil Ujian</a>
        <a onclick="show('bank')" id="n-bank" class="nav-link">📚 Bank Soal</a>
        <a onclick="show('siswa')" id="n-siswa" class="nav-link">👥 Data Siswa</a>
        <a onclick="show('set')" id="n-set" class="nav-link">⚙️ Pengaturan</a>
        <hr class="mx-3 text-white-50">
        <a href="index.html" class="nav-link text-warning">🚪 Keluar</a>
    </nav>
</div>

<div class="content">
    <div id="p-dash">
        <h4 class="fw-bold mb-4">Monitoring Real-Time</h4>
        <div class="card p-3 mb-3">
            <div class="row g-2">
                <div class="col-md-5"><select id="mon-f-kelas" class="form-select"><option value="">-- Filter Kelas --</option></select></div>
                <div class="col-md-5"><select id="mon-f-mapel" class="form-select"><option value="">-- Filter Mapel --</option></select></div>
                <div class="col-md-2"><button onclick="renderMonitoring()" class="btn btn-primary w-100">Tampilkan</button></div>
            </div>
        </div>
        <div class="card p-0 overflow-hidden">
            <table class="table table-hover mb-0">
                <thead class="table-light"><tr><th>Nama Siswa</th><th>Kelas</th><th>Status</th><th>Waktu Curang</th><th>Aksi</th></tr></thead>
                <tbody id="list-monitoring"></tbody>
            </table>
        </div>
    </div>

    <div id="p-hasil" class="hidden">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold">Hasil Ujian <span id="count-hasil" class="badge bg-secondary fs-6">0</span></h4>
            <button onclick="exportHasil()" class="btn btn-success btn-sm">Export Excel (Data Tampil)</button>
        </div>
        <div class="card p-3 mb-3">
            <div class="row g-2">
                <div class="col-md-4"><select id="f-kelas" class="form-select"><option value="">-- Pilih Kelas --</option></select></div>
                <div class="col-md-4"><select id="f-mapel" class="form-select"><option value="">-- Pilih Mapel --</option></select></div>
                <div class="col-md-2"><button onclick="renderHasil()" class="btn btn-primary w-100 font-bold">TAMPILKAN</button></div>
                <div class="col-md-2"><button onclick="resetFilterHasil()" class="btn btn-outline-secondary w-100">Reset</button></div>
            </div>
        </div>
        <div class="card p-0 overflow-hidden">
            <table class="table table-striped mb-0" id="table-hasil">
                <thead class="table-dark"><tr><th>Nama</th><th>Kelas</th><th>Mapel</th><th>Nilai</th><th>Waktu</th><th>Aksi</th></tr></thead>
                <tbody id="list-hasil"></tbody>
            </table>
        </div>
    </div>

    <div id="p-set" class="hidden">
        <h4 class="fw-bold mb-4">Pengaturan Aplikasi</h4>
        <div class="card p-4">
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label fw-bold">Nama Sekolah</label><input type="text" id="set-sekolah" class="form-control"></div>
                <div class="col-md-6"><label class="form-label fw-bold">Nama Aplikasi</label><input type="text" id="set-app" class="form-control"></div>
                <div class="col-12"><label class="form-label fw-bold">URL Logo Sekolah</label><input type="text" id="set-logo" class="form-control"></div>
                <div class="col-12"><label class="form-label fw-bold text-danger">Pesan Notifikasi Curang</label><textarea id="set-pesan" class="form-control" rows="3"></textarea></div>
                <div class="col-12 mt-4"><button onclick="simpanPengaturan()" class="btn btn-primary w-100 fw-bold">SIMPAN PERUBAHAN</button></div>
            </div>
        </div>
    </div>

    <div id="p-bank" class="hidden">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold">Bank Soal</h4>
            <button onclick="downloadTemplateSoal()" class="btn btn-outline-primary btn-sm fw-bold">📥 Template Soal</button>
        </div>
        <div class="card p-4">
            <div class="row g-3">
                <div class="col-md-4"><input type="text" id="bs-mapel" class="form-control" placeholder="Mapel"></div>
                <div class="col-md-2"><input type="text" id="bs-kelas" class="form-control" placeholder="Kelas"></div>
                <div class="col-md-2"><input type="number" id="bs-durasi" class="form-control" placeholder="Menit"></div>
                <div class="col-md-2"><input type="date" id="bs-tgl" class="form-control"></div>
                <div class="col-md-2"><select id="bs-show-nilai" class="form-select"><option value="ya">Tampil Nilai</option><option value="tidak">Sembunyi</option></select></div>
                <div class="col-12"><input type="file" id="bs-file" class="form-control" accept=".xlsx"></div>
                <div class="col-12"><button onclick="uploadSoal()" class="btn btn-primary w-100 fw-bold">UPLOAD SOAL</button></div>
            </div>
        </div>
        <div class="card p-0 overflow-hidden"><table class="table mb-0"><thead class="table-dark"><tr><th>Mapel</th><th>Kelas</th><th>Status</th><th>Aksi</th></tr></thead><tbody id="t-soal"></tbody></table></div>
    </div>

    <div id="p-siswa" class="hidden">
        <h4 class="fw-bold mb-4">Data Siswa</h4>
        <div class="card p-4 mb-4">
            <div class="row g-2 mb-4">
                <div class="col-md-3"><input type="text" id="m-nama" class="form-control" placeholder="Nama"></div>
                <div class="col-md-2"><input type="text" id="m-kelas" class="form-control" placeholder="Kelas"></div>
                <div class="col-md-3"><input type="text" id="m-user" class="form-control" placeholder="User"></div>
                <div class="col-md-2"><input type="text" id="m-pass" class="form-control" placeholder="Pass"></div>
                <div class="col-md-2"><button onclick="addManualSiswa()" class="btn btn-primary w-100">Tambah</button></div>
            </div>
            <hr>
            <input type="file" id="s-file" class="form-control mb-2" accept=".xlsx">
            <button onclick="uploadSiswa()" class="btn btn-dark w-100">Import Data Siswa</button>
        </div>
        <div class="card p-0 overflow-hidden"><table class="table mb-0"><thead class="table-light"><tr><th>Nama</th><th>Kelas</th><th>User/Sandi</th><th>Status</th><th>Aksi</th></tr></thead><tbody id="t-siswa"></tbody></table></div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBGl1WySSrPU_86T0SOKi0FhpMdAw8NXLs", databaseURL: "https://cbt-v1-c3387-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let dataSiswaGlobal = [];
    let dataHasilGlobal = [];

    function show(p) {
        ['dash','hasil','bank','siswa','set'].forEach(i => { 
            document.getElementById('p-'+i).classList.add('hidden'); 
            document.getElementById('n-'+i).classList.remove('active'); 
        });
        document.getElementById('p-'+p).classList.remove('hidden'); 
        document.getElementById('n-'+p).classList.add('active');
    }

    // LOAD INITIAL DATA
    db.ref('pengaturan').on('value', snap => {
        const d = snap.val();
        if(d) {
            document.getElementById('set-sekolah').value = d.nama_sekolah || "";
            document.getElementById('set-app').value = d.nama_aplikasi || "";
            document.getElementById('set-logo').value = d.logo_url || "";
            document.getElementById('set-pesan').value = d.pesan_curang || "";
            document.getElementById('sidebar-sekolah').innerText = d.nama_sekolah || "Administrator";
        }
    });

    db.ref('siswa').on('value', snap => {
        dataSiswaGlobal = []; let setKelas = new Set();
        snap.forEach(s => { const v = s.val(); v.key = s.key; dataSiswaGlobal.push(v); setKelas.add(v.kelas); });
        updateDropdown('mon-f-kelas', Array.from(setKelas));
        updateDropdown('f-kelas', Array.from(setKelas));
        renderSiswa();
    });

    db.ref('bank_soal').on('value', snap => {
        let setMapel = new Set(); let h = "";
        snap.forEach(c => {
            const v = c.val(); v.key = c.key; setMapel.add(v.mapel);
            let st = v.status === 'aktif' ? '<span class="badge bg-success">Aktif</span>' : '<span class="badge bg-secondary">Off</span>';
            h += `<tr><td>${v.mapel}</td><td>${v.kelas}</td><td>${st}</td><td><button onclick="db.ref('bank_soal/${v.key}').update({status:'aktif'})" class="btn btn-xs btn-outline-success">On</button> <button onclick="db.ref('bank_soal/${v.key}').update({status:'nonaktif'})" class="btn btn-xs btn-outline-secondary">Off</button> <button onclick="hapusData('bank_soal/${v.key}')" class="btn btn-xs btn-danger">X</button></td></tr>`;
        });
        document.getElementById('t-soal').innerHTML = h;
        updateDropdown('mon-f-mapel', Array.from(setMapel));
        updateDropdown('f-mapel', Array.from(setMapel));
    });

    db.ref('hasil').on('value', snap => {
        dataHasilGlobal = []; snap.forEach(c => { dataHasilGlobal.push({ ...c.val(), key: c.key }); });
    });

    // RENDER FUNCTIONS (MANUAL TRIGGER)
    function renderMonitoring() {
        const fk = document.getElementById('mon-f-kelas').value;
        const fm = document.getElementById('mon-f-mapel').value;
        if(!fk) return Swal.fire('Info', 'Pilih kelas terlebih dahulu', 'info');
        
        let h = "";
        dataSiswaGlobal.filter(s => s.kelas === fk).forEach(s => {
            const sudahSelesai = dataHasilGlobal.some(h => h.nama === s.nama && (fm === "" || h.mapel === fm));
            let badge = s.status === 'curang' ? '<span class="badge bg-danger">CURANG</span>' : (sudahSelesai ? '<span class="badge bg-primary">SELESAI</span>' : '<span class="badge bg-success">AKTIF</span>');
            h += `<tr><td><span class="status-dot ${s.status === 'curang' ? 'bg-danger' : (sudahSelesai ? 'bg-primary' : 'bg-success')}"></span>${s.nama}</td><td>${s.kelas}</td><td>${badge}</td><td><small class="text-danger">${s.waktu_curang || '-'}</small></td><td><button onclick="db.ref('siswa/${s.key}').update({status:'aktif', waktu_curang:null})" class="btn btn-xs btn-warning">Reset</button></td></tr>`;
        });
        document.getElementById('list-monitoring').innerHTML = h;
    }

    function renderHasil() {
        const fk = document.getElementById('f-kelas').value;
        const fm = document.getElementById('f-mapel').value;
        if(!fk || !fm) return Swal.fire('Info', 'Pilih Kelas dan Mapel', 'info');

        let h = ""; let count = 0;
        dataHasilGlobal.filter(d => d.kelas === fk && d.mapel === fm).forEach(v => {
            count++;
            h += `<tr><td>${v.nama}</td><td>${v.kelas}</td><td>${v.mapel}</td><td><b>${v.nilai}</b></td><td>${v.waktu}</td><td><button onclick="hapusData('hasil/${v.key}')" class="btn btn-xs btn-danger">Hapus</button></td></tr>`;
        });
        document.getElementById('list-hasil').innerHTML = h;
        document.getElementById('count-hasil').innerText = count;
        if(count === 0) Swal.fire('Kosong', 'Tidak ada data hasil untuk filter ini', 'warning');
    }

    function renderSiswa() {
        let h = "";
        dataSiswaGlobal.forEach(v => {
            h += `<tr><td>${v.nama}</td><td>${v.kelas}</td><td>${v.username} / ${v.sandi}</td><td>${v.status}</td><td><button onclick="hapusData('siswa/${v.key}')" class="btn btn-xs btn-danger">Hapus</button></td></tr>`;
        });
        document.getElementById('t-siswa').innerHTML = h;
    }

    // HELPERS
    function updateDropdown(id, data) {
        const el = document.getElementById(id); const cur = el.value;
        let h = `<option value="">-- Pilih --</option>`;
        data.sort().forEach(v => { h += `<option value="${v}">${v}</option>`; });
        el.innerHTML = h; el.value = cur;
    }

    function resetFilterHasil() { 
        document.getElementById('f-kelas').value = ""; 
        document.getElementById('f-mapel').value = ""; 
        document.getElementById('list-hasil').innerHTML = "";
        document.getElementById('count-hasil').innerText = "0";
    }

    function exportHasil() {
        const table = document.getElementById("table-hasil");
        if(table.rows.length <= 1) return Swal.fire('Gagal', 'Tampilkan data dulu sebelum export', 'error');
        const clone = table.cloneNode(true);
        clone.querySelectorAll('tr').forEach(tr => { if(tr.lastElementChild) tr.removeChild(tr.lastElementChild); });
        XLSX.writeFile(XLSX.utils.table_to_book(clone), `Hasil_${document.getElementById('f-mapel').value}_${document.getElementById('f-kelas').value}.xlsx`);
    }

    function simpanPengaturan() {
        db.ref('pengaturan').set({
            nama_sekolah: document.getElementById('set-sekolah').value,
            nama_aplikasi: document.getElementById('set-app').value,
            logo_url: document.getElementById('set-logo').value,
            pesan_curang: document.getElementById('set-pesan').value
        }).then(() => Swal.fire('Berhasil', 'Pengaturan disimpan', 'success'));
    }

    function hapusData(path) {
        Swal.fire({ title: 'Hapus?', icon: 'warning', showCancelButton: true }).then(r => { if(r.isConfirmed) db.ref(path).remove(); });
    }

    function uploadSoal() {
        const m = document.getElementById('bs-mapel').value, k = document.getElementById('bs-kelas').value, f = document.getElementById('bs-file').files[0];
        if(!m || !f) return Swal.fire('Error', 'Isi Mapel & Pilih File', 'error');
        const reader = new FileReader();
        reader.onload = (e) => {
            const data = new Uint8Array(e.target.result), wb = XLSX.read(data, {type: 'array'}), json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            const soalFormatted = json.map(r => ({ pertanyaan: r.pertanyaan||"", gambar: r.url_gambar||"", opsi_a: r.opsi_a||"", opsi_b: r.opsi_b||"", opsi_c: r.opsi_c||"", opsi_d: r.opsi_d||"", kunci: r.kunci||"", tipe: r.tipe_soal||"pilihan_ganda" }));
            db.ref('bank_soal').push({ mapel:m, kelas:k, durasi:document.getElementById('bs-durasi').value, tanggal:document.getElementById('bs-tgl').value, showNilai: document.getElementById('bs-show-nilai').value, soal: soalFormatted, status: "aktif" }).then(() => Swal.fire('Selesai','Soal terupload','success'));
        };
        reader.readAsArrayBuffer(f);
    }

    function uploadSiswa() {
        const f = document.getElementById('s-file').files[0]; if(!f) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const data = new Uint8Array(e.target.result), wb = XLSX.read(data, {type: 'array'}), json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            json.forEach(i => { if(i.nama) db.ref('siswa').push({ nama: i.nama, kelas: i.kelas, username: i.username, sandi: i.sandi, status: "aktif" }); });
            Swal.fire('Sukses','Import selesai','success');
        };
        reader.readAsArrayBuffer(f);
    }
</script>
</body>
</html>
