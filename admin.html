<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SENSEI Admin - Master</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .hidden { display: none; }
        .sidebar { width: 240px; background: #1e3a8a; color: white; min-height: 100vh; position: fixed; }
        .content { margin-left: 240px; padding: 30px; }
        .nav-link { color: #ccc; cursor: pointer; padding: 10px 20px; display: block; text-decoration: none; }
        .nav-link.active { background: rgba(255,255,255,0.1); color: white; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="p-4 fw-bold text-center border-bottom border-white-50">SENSEI CBT</div>
    <div onclick="show('bank')" id="n-bank" class="nav-link active">📚 Bank Soal</div>
    <div onclick="show('siswa')" id="n-siswa" class="nav-link">👥 Siswa & Blokir</div>
    <div onclick="show('analisis')" id="n-analisis" class="nav-link">📈 Analisis</div>
    <div onclick="show('set')" id="n-set" class="nav-link">⚙️ Pengaturan</div>
    <a href="index.html" class="nav-link text-warning mt-5">🚪 Keluar</a>
</div>

<div class="content">
    <div id="p-bank">
        <h4>Manajemen Soal</h4>
        <button onclick="downloadTemplate()" class="btn btn-success mb-3">📥 Download Template Excel</button>
        <div class="card p-4 mb-4">
            <input type="text" id="bs-mapel" class="form-control mb-2" placeholder="Mapel">
            <input type="file" id="bs-file" class="form-control mb-2">
            <button onclick="uploadSoal()" class="btn btn-primary">Upload & Aktifkan</button>
        </div>
        <table class="table table-bordered">
            <thead class="table-dark"><tr><th>Mapel</th><th>Status</th><th>Aksi</th></tr></thead>
            <tbody id="t-soal"></tbody>
        </table>
    </div>

    <div id="p-siswa" class="hidden">
        <h4>Data Siswa</h4>
        <div class="card p-3 mb-3">
            <input type="text" id="m-nama" placeholder="Nama" class="form-control mb-2">
            <input type="text" id="m-user" placeholder="User" class="form-control mb-2">
            <input type="text" id="m-pass" placeholder="Pass" class="form-control mb-2">
            <button onclick="addSiswa()" class="btn btn-primary">Tambah Siswa</button>
        </div>
        <table class="table align-middle">
            <thead><tr><th>Nama</th><th>Akses</th><th>Status</th><th>Aksi</th></tr></thead>
            <tbody id="t-siswa"></tbody>
        </table>
    </div>

    <div id="p-analisis" class="hidden">
        <h4>Analisis Butir Soal</h4>
        <div id="analisis-box"></div>
    </div>

    <div id="p-set" class="hidden">
        <h4>Setting Web</h4>
        <input type="text" id="s-nama" class="form-control mb-2" placeholder="Nama Sekolah">
        <input type="text" id="s-judul" class="form-control mb-2" placeholder="Judul App">
        <input type="text" id="s-logo" class="form-control mb-3" placeholder="URL Logo">
        <button onclick="saveSet()" class="btn btn-primary">Simpan</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBGl1WySSrPU_86T0SOKi0FhpMdAw8NXLs", databaseURL: "https://cbt-v1-c3387-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function show(p) {
        document.querySelectorAll('.content > div').forEach(d => d.classList.add('hidden'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById('p-'+p).classList.remove('hidden');
        document.getElementById('n-'+p).classList.add('active');
    }

    // DOWNLOAD TEMPLATE EXCEL
    function downloadTemplate() {
        const data = [["NO","PERTANYAAN","URL_GAMBAR","OPSI_A","OPSI_B","OPSI_C","OPSI_D","KUNCI","JENIS"]];
        const ws = XLSX.utils.aoa_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Soal");
        XLSX.writeFile(wb, "Template_SENSEI.xlsx");
    }

    // MANAJEMEN SISWA & BLOKIR
    db.ref('siswa').on('value', snap => {
        let h = "";
        snap.forEach(c => {
            const v = c.val();
            const badg = v.status === 'blokir' ? '<span class="badge bg-danger">DIBLOKIR</span>' : '<span class="badge bg-success">Aktif</span>';
            const btn = v.status === 'blokir' ? `<button onclick="db.ref('siswa/${c.key}').update({status:'aktif'})" class="btn btn-sm btn-warning">Buka Blokir</button>` : '';
            h += `<tr><td>${v.nama}</td><td>${v.username}</td><td>${badg}</td><td>${btn} <button onclick="db.ref('siswa/${c.key}').remove()" class="btn btn-sm btn-danger">Hapus</button></td></tr>`;
        });
        document.getElementById('t-siswa').innerHTML = h;
    });

    // UPLOAD SOAL
    function uploadSoal() {
        const f = document.getElementById('bs-file').files[0];
        const m = document.getElementById('bs-mapel').value;
        const reader = new FileReader();
        reader.onload = e => {
            const data = new Uint8Array(e.target.result);
            const wb = XLSX.read(data, {type:'array'});
            const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            db.ref('bank_soal').push({ mapel: m, soal: json, status: 'aktif' }).then(() => Swal.fire('Berhasil','Soal aktif','success'));
        };
        reader.readAsArrayBuffer(f);
    }

    function saveSet() {
        db.ref('pengaturan').set({
            nama_sekolah: document.getElementById('s-nama').value,
            judul_app: document.getElementById('s-judul').value,
            logo_url: document.getElementById('s-logo').value
        }).then(() => Swal.fire('Sip','Tersimpan','success'));
    }
</script>
</body>
</html>
