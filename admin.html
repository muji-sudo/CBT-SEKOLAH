<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT PRO - Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #1e3a8a; }
        body { background: #f8fafc; font-family: 'Inter', sans-serif; }
        .sidebar { background: var(--primary); color: white; min-height: 100vh; width: 260px; position: fixed; z-index: 1000; }
        .content { margin-left: 260px; padding: 30px; }
        .nav-link { color: #cbd5e1; cursor: pointer; padding: 12px 20px; border-radius: 8px; margin: 5px 15px; display: block; text-decoration: none; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.1); color: white; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="p-4 text-center">
        <div class="bg-warning text-blue-900 d-inline-block px-3 py-1 rounded fw-bold mb-2">CBT PRO</div>
        <h6 class="fw-bold text-white">Administrator</h6>
    </div>
    <nav class="mt-3">
        <a onclick="show('dash')" id="n-dash" class="nav-link active">📊 Monitoring</a>
        <a onclick="show('hasil')" id="n-hasil" class="nav-link">📝 Hasil Ujian</a>
        <a onclick="show('bank')" id="n-bank" class="nav-link">📚 Bank Soal</a>
        <a onclick="show('siswa')" id="n-siswa" class="nav-link">👥 Data Siswa</a>
        <hr class="mx-3 text-white-50">
        <a href="index.html" class="nav-link text-warning">🚪 Keluar</a>
    </nav>
</div>

<div class="content">
    <div id="p-dash">
        <h4 class="fw-bold mb-4">Monitoring Real-Time</h4>
        <div class="card p-0 overflow-hidden">
            <table class="table table-hover mb-0">
                <thead class="table-light"><tr><th>Nama</th><th>Kelas</th><th>Status</th><th>Waktu Curang</th><th>Aksi</th></tr></thead>
                <tbody id="list-monitoring"></tbody>
            </table>
        </div>
    </div>

    <div id="p-hasil" class="hidden">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold">Hasil Ujian Siswa</h4>
            <button onclick="exportHasil()" class="btn btn-success btn-sm">Export Excel</button>
        </div>
        <div class="card p-0 overflow-hidden">
            <table class="table table-striped mb-0">
                <thead class="table-dark"><tr><th>Nama</th><th>Kelas</th><th>Mapel</th><th>Nilai</th><th>Waktu</th></tr></thead>
                <tbody id="list-hasil"></tbody>
            </table>
        </div>
    </div>

    <div id="p-bank" class="hidden">
        <h4 class="fw-bold mb-4">Bank Soal</h4>
        <div class="card p-4">
            <div class="row g-3">
                <div class="col-md-4"><input type="text" id="bs-mapel" class="form-control" placeholder="Mata Pelajaran"></div>
                <div class="col-md-2"><input type="text" id="bs-kelas" class="form-control" placeholder="Kelas"></div>
                <div class="col-md-2"><input type="number" id="bs-durasi" class="form-control" placeholder="Menit"></div>
                <div class="col-md-2"><input type="date" id="bs-tgl" class="form-control"></div>
                <div class="col-md-2"><select id="bs-show-nilai" class="form-select"><option value="ya">Tampil Nilai</option><option value="tidak">Sembunyi</option></select></div>
                <div class="col-md-12"><input type="file" id="bs-file" class="form-control" accept=".xlsx"></div>
                <div class="col-12"><button onclick="uploadSoal()" class="btn btn-primary w-100 fw-bold">Upload Soal</button></div>
            </div>
        </div>
        <div class="card p-0 overflow-hidden"><table class="table mb-0"><thead class="table-dark"><tr><th>Mapel</th><th>Kelas</th><th>Hapus</th></tr></thead><tbody id="t-soal"></tbody></table></div>
    </div>

    <div id="p-siswa" class="hidden">
        <h4 class="fw-bold mb-4">Data Siswa</h4>
        <div class="card p-4 mb-4 text-center">
            <input type="file" id="s-file" class="form-control mb-3" accept=".xlsx">
            <button onclick="uploadSiswa()" class="btn btn-dark w-100">Import Data Excel</button>
        </div>
        <div class="card p-0 overflow-hidden"><table class="table mb-0"><thead class="table-light"><tr><th>Nama</th><th>User/Sandi</th><th>Aksi</th></tr></thead><tbody id="t-siswa"></tbody></table></div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBGl1WySSrPU_86T0SOKi0FhpMdAw8NXLs", databaseURL: "https://cbt-v1-c3387-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function show(p) {
        ['dash','hasil','bank','siswa'].forEach(i => { document.getElementById('p-'+i).classList.add('hidden'); document.getElementById('n-'+i).classList.remove('active'); });
        document.getElementById('p-'+p).classList.remove('hidden'); document.getElementById('n-'+p).classList.add('active');
    }

    // MONITORING REALTIME
    db.ref('siswa').on('value', snap => {
        let h = "";
        snap.forEach(s => {
            const v = s.val();
            let st = v.status === 'curang' ? '<span class="badge bg-danger">CURANG</span>' : (v.status === 'blokir' ? '<span class="badge bg-dark">BLOKIR</span>' : '<span class="badge bg-success">AKTIF</span>');
            h += `<tr>
                <td>${v.nama}</td><td>${v.kelas}</td><td>${st}</td>
                <td><small class="text-danger">${v.waktu_curang || '-'}</small></td>
                <td>
                    <button onclick="db.ref('siswa/${s.key}').update({status:'aktif', waktu_curang:null})" class="btn btn-xs btn-outline-success py-0" style="font-size:10px">Reset</button>
                    <button onclick="db.ref('siswa/${s.key}').update({status:'blokir'})" class="btn btn-xs btn-outline-dark py-0" style="font-size:10px">Blokir</button>
                </td>
            </tr>`;
        });
        document.getElementById('list-monitoring').innerHTML = h;
    });

    // LIST HASIL UJIAN
    db.ref('hasil').on('value', snap => {
        let h = "";
        snap.forEach(c => {
            const v = c.val();
            h += `<tr><td>${v.nama}</td><td>${v.kelas}</td><td>${v.mapel}</td><td><b>${v.nilai}</b></td><td>${v.waktu}</td></tr>`;
        });
        document.getElementById('list-hasil').innerHTML = h;
    });

    function exportHasil() {
        const table = document.getElementById("p-hasil").querySelector("table");
        const wb = XLSX.utils.table_to_book(table);
        XLSX.writeFile(wb, "Hasil_Ujian.xlsx");
    }

    // FUNGSI UPLOAD (Sama dengan sebelumnya namun dipastikan jalan)
    function uploadSiswa() {
        const file = document.getElementById('s-file').files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            const data = new Uint8Array(e.target.result), wb = XLSX.read(data, {type: 'array'}), json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            json.forEach(item => { if(item.nama) db.ref('siswa').push({ nama: item.nama, kelas: item.kelas, username: item.username, sandi: item.sandi, status: "aktif" }); });
            Swal.fire('Sukses','Data diimport','success');
        };
        reader.readAsArrayBuffer(file);
    }

    function uploadSoal() {
        const f = document.getElementById('bs-file').files[0];
        const reader = new FileReader();
        reader.onload = e => {
            const data = new Uint8Array(e.target.result), wb = XLSX.read(data, {type:'array'}), json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            db.ref('bank_soal').push({ mapel: document.getElementById('bs-mapel').value, kelas: document.getElementById('bs-kelas').value, durasi: document.getElementById('bs-durasi').value, tanggal: document.getElementById('bs-tgl').value, showNilai: document.getElementById('bs-show-nilai').value, soal: json, status: "aktif" }).then(() => Swal.fire('Ok','Uploaded','success'));
        };
        reader.readAsArrayBuffer(f);
    }

    db.ref('bank_soal').on('value', snap => {
        let h = "";
        snap.forEach(c => { h += `<tr><td>${c.val().mapel}</td><td>${c.val().kelas}</td><td><button onclick="db.ref('bank_soal/${c.key}').remove()" class="btn btn-danger btn-sm">X</button></td></tr>`; });
        document.getElementById('t-soal').innerHTML = h;
    });

    db.ref('siswa').on('value', snap => {
        let h = "";
        snap.forEach(c => { h += `<tr><td>${c.val().nama}</td><td>${c.val().username}/${c.val().sandi}</td><td><button onclick="db.ref('siswa/${c.key}').remove()" class="btn btn-danger btn-sm">Hapus</button></td></tr>`; });
        document.getElementById('t-siswa').innerHTML = h;
    });
</script>
</body>
</html>
