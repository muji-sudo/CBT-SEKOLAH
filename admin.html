<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT PRO - Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #1e3a8a; }
        body { background: #f8fafc; font-family: 'Inter', sans-serif; }
        .sidebar { background: var(--primary); color: white; min-height: 100vh; width: 260px; position: fixed; z-index: 1000; }
        .content { margin-left: 260px; padding: 30px; }
        .nav-link { color: #cbd5e1; cursor: pointer; padding: 12px 20px; border-radius: 8px; margin: 5px 15px; display: block; text-decoration: none; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.1); color: white; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="p-4 text-center"><h5 class="fw-bold text-white">ADMIN CBT</h5></div>
    <nav class="mt-3">
        <a onclick="show('dash')" class="nav-link">Monitoring</a>
        <a onclick="show('bank')" class="nav-link">Bank Soal (Excel)</a>
        <a onclick="show('siswa')" class="nav-link">Data Siswa</a>
        <a onclick="show('set')" class="nav-link">Pengaturan</a>
        <a href="index.html" class="nav-link text-warning">Logout</a>
    </nav>
</div>

<div class="content">
    <div id="p-dash">
        <h4 class="fw-bold mb-4">Monitoring Hasil</h4>
        <div class="card p-0 overflow-hidden">
            <table class="table table-hover mb-0">
                <thead class="table-light"><tr><th>Nama</th><th>Kelas</th><th>Mapel</th><th>Skor</th><th>Aksi</th></tr></thead>
                <tbody id="list-hasil-body"></tbody>
            </table>
        </div>
    </div>

    <div id="p-bank" class="hidden">
        <h4 class="fw-bold mb-4">Manajemen Soal (Excel Only)</h4>
        <div class="card p-4">
            <div class="row g-3">
                <div class="col-md-3"><input type="text" id="bs-mapel" class="form-control" placeholder="Mapel"></div>
                <div class="col-md-2"><input type="text" id="bs-kelas" class="form-control" placeholder="Kelas"></div>
                <div class="col-md-2"><input type="number" id="bs-durasi" class="form-control" placeholder="Menit"></div>
                <div class="col-md-2"><input type="date" id="bs-tgl" class="form-control"></div>
                <div class="col-md-3"><input type="file" id="bs-file" class="form-control" accept=".xlsx"></div>
                <div class="col-12"><button onclick="uploadSoal()" class="btn btn-primary w-100 fw-bold">UPLOAD SOAL</button></div>
            </div>
        </div>
        <div class="card p-0 overflow-hidden"><table class="table mb-0 text-center"><tbody id="t-soal"></tbody></table></div>
    </div>

    <div id="p-siswa" class="hidden">
        <h4 class="fw-bold mb-4">Data Siswa</h4>
        <div class="card p-4 mb-4">
            <h6 class="fw-bold mb-3">Tambah Siswa Baru</h6>
            <div class="row g-2">
                <div class="col-md-3"><input type="text" id="m-nama" class="form-control" placeholder="Nama"></div>
                <div class="col-md-2"><input type="text" id="m-kelas" class="form-control" placeholder="Kelas"></div>
                <div class="col-md-2"><input type="text" id="m-user" class="form-control" placeholder="Username"></div>
                <div class="col-md-2"><input type="text" id="m-pass" class="form-control" placeholder="Password"></div>
                <div class="col-md-3"><button onclick="addManual()" class="btn btn-success w-100">Tambah</button></div>
            </div>
        </div>
        <div class="card p-0 overflow-hidden"><table class="table table-sm mb-0">
            <thead class="table-light"><tr><th>Nama</th><th>Kelas</th><th>Status</th><th>Aksi</th></tr></thead>
            <tbody id="t-siswa"></tbody>
        </table></div>
    </div>

    <div id="p-set" class="hidden">
        <h4 class="fw-bold mb-4">Pengaturan</h4>
        <div class="card p-4" style="max-width: 500px;">
            <div class="mb-3"><label>Nama Sekolah</label><input type="text" id="set-nama" class="form-control"></div>
            <div class="mb-3"><label>Pesan Curang</label><textarea id="set-curang" class="form-control"></textarea></div>
            <button onclick="saveSettings()" class="btn btn-primary w-100">Simpan</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBGl1WySSrPU_86T0SOKi0FhpMdAw8NXLs", databaseURL: "https://cbt-v1-c3387-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function show(p) {
        ['dash','bank','siswa','set'].forEach(i => { document.getElementById('p-'+i).classList.add('hidden'); });
        document.getElementById('p-'+p).classList.remove('hidden');
    }

    // Fungsi Upload Excel
    function uploadSoal() {
        const f = document.getElementById('bs-file').files[0];
        if(!f) return Swal.fire('Error','Pilih file!','error');
        const reader = new FileReader();
        reader.onload = e => {
            const data = new Uint8Array(e.target.result), wb = XLSX.read(data, {type:'array'}), json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            db.ref('bank_soal').push({
                mapel: document.getElementById('bs-mapel').value,
                kelas: document.getElementById('bs-kelas').value,
                durasi: document.getElementById('bs-durasi').value,
                tanggal: document.getElementById('bs-tgl').value,
                soal: json, status: "aktif"
            }).then(() => Swal.fire('Berhasil','Soal Aktif!','success'));
        };
        reader.readAsArrayBuffer(f);
    }

    // Fungsi Tambah Siswa
    function addManual() {
        db.ref('siswa').push({
            nama: document.getElementById('m-nama').value,
            kelas: document.getElementById('m-kelas').value,
            username: document.getElementById('m-user').value,
            sandi: document.getElementById('m-pass').value,
            status: "aktif"
        });
    }

    // Real-time Siswa List
    db.ref('siswa').on('value', snap => {
        let h = "";
        snap.forEach(c => {
            const v = c.val();
            const btnStatus = v.status === 'blokir' ? `<button class="btn btn-sm btn-warning" onclick="db.ref('siswa/${c.key}').update({status:'aktif'})">Buka Blokir</button>` : '';
            h += `<tr><td>${v.nama}</td><td>${v.kelas}</td><td><span class="badge ${v.status=='blokir'?'bg-danger':'bg-success'}">${v.status}</span></td><td>${btnStatus} <button class="btn btn-sm btn-danger" onclick="db.ref('siswa/${c.key}').remove()">Hapus</button></td></tr>`;
        });
        document.getElementById('t-siswa').innerHTML = h;
    });

    // Real-time Bank Soal List
    db.ref('bank_soal').on('value', snap => {
        let h = "";
        snap.forEach(c => {
            const v = c.val();
            h += `<tr><td>${v.mapel} - ${v.kelas}</td><td><button class="btn btn-sm btn-danger" onclick="db.ref('bank_soal/${c.key}').remove()">Hapus Paket</button></td></tr>`;
        });
        document.getElementById('t-soal').innerHTML = h;
    });

    // Real-time Monitoring
    db.ref('hasil').on('value', snap => {
        let h = "";
        snap.forEach(c => {
            const v = c.val();
            h += `<tr><td>${v.nama}</td><td>${v.kelas}</td><td>${v.mapel}</td><td>${v.nilai}</td><td><button class="btn btn-sm btn-danger" onclick="db.ref('hasil/${c.key}').remove()">Hapus</button></td></tr>`;
        });
        document.getElementById('list-hasil-body').innerHTML = h;
    });

    function saveSettings() {
        db.ref('pengaturan').set({ nama_sekolah: document.getElementById('set-nama').value, pesan_curang: document.getElementById('set-curang').value });
    }
</script>
</body>
</html>
