<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT PRO - Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #1e3a8a; }
        body { background: #f8fafc; font-family: 'Inter', sans-serif; }
        .sidebar { background: var(--primary); color: white; min-height: 100vh; width: 260px; position: fixed; z-index: 1000; transition: 0.3s; }
        .content { margin-left: 260px; padding: 30px; transition: 0.3s; }
        .nav-link { color: #cbd5e1; cursor: pointer; padding: 12px 20px; border-radius: 8px; margin: 5px 15px; display: block; text-decoration: none; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.1); color: white; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 20px; }
        .hidden { display: none; }
        @media (max-width: 768px) { .sidebar { width: 0; overflow: hidden; } .content { margin-left: 0; } .sidebar.active { width: 260px; } }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="p-4 text-center">
        <div class="bg-warning text-blue-900 d-inline-block px-3 py-1 rounded fw-bold mb-2">CBT PRO</div>
        <h6 class="fw-bold text-white">Administrator</h6>
    </div>
    <nav class="mt-3">
        <a onclick="show('dash')" id="n-dash" class="nav-link active">📊 Monitoring</a>
        <a onclick="show('bank')" id="n-bank" class="nav-link">📚 Bank Soal</a>
        <a onclick="show('siswa')" id="n-siswa" class="nav-link">👥 Data Siswa</a>
        <a onclick="show('set')" id="n-set" class="nav-link">⚙️ Pengaturan Web</a>
        <hr class="mx-3 text-white-50">
        <a href="index.html" class="nav-link text-warning">🚪 Keluar</a>
    </nav>
</div>

<div class="content">
    <div id="p-dash">
        <h4 class="fw-bold mb-4">Monitoring Hasil Ujian</h4>
        <div class="card p-0 overflow-hidden">
            <table class="table table-hover mb-0">
                <thead class="table-light"><tr><th>Nama</th><th>Kelas</th><th>Mapel</th><th>Skor</th><th>Waktu</th><th>Aksi</th></tr></thead>
                <tbody id="list-hasil-body"></tbody>
            </table>
        </div>
    </div>

    <div id="p-siswa" class="hidden">
        <h4 class="fw-bold mb-4">Data Siswa & Status</h4>
        <div class="card p-4 mb-4">
            <h6>Tambah Manual</h6>
            <div class="row g-2">
                <div class="col-md-3"><input type="text" id="m-nama" class="form-control" placeholder="Nama"></div>
                <div class="col-md-2"><input type="text" id="m-kelas" class="form-control" placeholder="Kelas"></div>
                <div class="col-md-3"><input type="text" id="m-user" class="form-control" placeholder="Username"></div>
                <div class="col-md-2"><input type="text" id="m-pass" class="form-control" placeholder="Sandi"></div>
                <div class="col-md-2"><button onclick="addManual()" class="btn btn-primary w-100">Simpan</button></div>
            </div>
        </div>
        <div class="card p-0 overflow-hidden">
            <table class="table mb-0">
                <thead class="table-light"><tr><th>Nama</th><th>Username</th><th>Status</th><th>Aksi</th></tr></thead>
                <tbody id="t-siswa"></tbody>
            </table>
        </div>
    </div>

    <div id="p-set" class="hidden">
        <h4 class="fw-bold mb-4">Pengaturan Web</h4>
        <div class="card p-4 mx-auto" style="max-width: 600px;">
            <div class="mb-3"><label>Nama Sekolah</label><input type="text" id="set-nama" class="form-control"></div>
            <div class="mb-3"><label>Judul Aplikasi</label><input type="text" id="set-judul" class="form-control"></div>
            <div class="mb-3"><label>URL Logo</label><input type="text" id="set-logo" class="form-control"></div>
            <div class="mb-3 text-danger"><label>Pesan Anti-Curang</label><textarea id="set-curang" class="form-control"></textarea></div>
            <button onclick="saveSettings()" class="btn btn-primary w-100">Simpan Perubahan</button>
        </div>
    </div>
    
    <div id="p-bank" class="hidden">
        <h4 class="fw-bold mb-4">Bank Soal</h4>
        <div class="card p-4">
            <input type="file" id="bs-file" class="form-control mb-2">
            <input type="text" id="bs-mapel" class="form-control mb-2" placeholder="Mapel">
            <input type="text" id="bs-kelas" class="form-control mb-2" placeholder="Kelas">
            <input type="number" id="bs-durasi" class="form-control mb-2" placeholder="Menit">
            <input type="date" id="bs-tgl" class="form-control mb-2">
            <button onclick="uploadSoal()" class="btn btn-primary w-100">Upload Soal</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBGl1WySSrPU_86T0SOKi0FhpMdAw8NXLs", databaseURL: "https://cbt-v1-c3387-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function show(p) {
        ['dash','bank','siswa','set'].forEach(i => { document.getElementById('p-'+i).classList.add('hidden'); });
        document.getElementById('p-'+p).classList.remove('hidden');
    }

    db.ref('siswa').on('value', snap => {
        let h = "";
        snap.forEach(c => {
            const v = c.val();
            const btnStatus = v.status === 'diblokir' ? 
                `<button onclick="updateStatus('${c.key}', 'aktif')" class="btn btn-sm btn-warning">Buka Blokir</button>` : 
                `<span class="badge bg-success">Aktif</span>`;
            h += `<tr><td>${v.nama}</td><td>${v.username}</td><td>${btnStatus}</td><td><button onclick="db.ref('siswa/${c.key}').remove()" class="btn btn-sm btn-danger">Hapus</button></td></tr>`;
        });
        document.getElementById('t-siswa').innerHTML = h;
    });

    function updateStatus(key, st) { db.ref('siswa/'+key).update({status: st}); }

    function addManual() {
        const n = document.getElementById('m-nama').value, u = document.getElementById('m-user').value, p = document.getElementById('m-pass').value, k = document.getElementById('m-kelas').value;
        db.ref('siswa').push({ nama: n, username: u, sandi: p, kelas: k, status: "aktif" });
    }

    function saveSettings() {
        db.ref('pengaturan').set({
            nama_sekolah: document.getElementById('set-nama').value,
            judul_app: document.getElementById('set-judul').value,
            logo_url: document.getElementById('set-logo').value,
            pesan_curang: document.getElementById('set-curang').value
        });
    }

    db.ref('pengaturan').on('value', snap => {
        const d = snap.val();
        if(d) {
            document.getElementById('set-nama').value = d.nama_sekolah || "";
            document.getElementById('set-judul').value = d.judul_app || "";
            document.getElementById('set-logo').value = d.logo_url || "";
            document.getElementById('set-curang').value = d.pesan_curang || "";
        }
    });

    db.ref('hasil').on('value', snap => {
        let h = "";
        snap.forEach(c => {
            const v = c.val();
            h += `<tr><td>${v.nama}</td><td>${v.kelas}</td><td>${v.mapel}</td><td>${v.nilai}</td><td>${v.waktu}</td><td><button onclick="db.ref('hasil/${c.key}').remove()" class="btn btn-sm btn-danger">Hapus</button></td></tr>`;
        });
        document.getElementById('list-hasil-body').innerHTML = h;
    });

    function uploadSoal() {
        const f = document.getElementById('bs-file').files[0], m = document.getElementById('bs-mapel').value, t = document.getElementById('bs-tgl').value, k = document.getElementById('bs-kelas').value, d = document.getElementById('bs-durasi').value;
        const reader = new FileReader();
        reader.onload = e => {
            const data = new Uint8Array(e.target.result), wb = XLSX.read(data, {type:'array'}), json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            db.ref('bank_soal').push({ mapel: m, kelas: k, durasi: d, tanggal: t, soal: json, status: "aktif" });
        };
        reader.readAsArrayBuffer(f);
    }
</script>
</body>
</html>
