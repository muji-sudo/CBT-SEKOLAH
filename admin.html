<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT PRO ADMIN - Multi Type</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #1e3a8a; }
        body { background: #f8fafc; font-family: 'Inter', sans-serif; }
        .sidebar { background: var(--primary); color: white; min-height: 100vh; width: 260px; position: fixed; z-index: 1000; }
        .content { margin-left: 260px; padding: 30px; }
        .nav-link { color: #cbd5e1; cursor: pointer; padding: 12px 20px; border-radius: 8px; margin: 5px 15px; display: block; text-decoration: none; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.1); color: white; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="p-4 text-center"><h5 class="fw-bold text-white">CBT PRO ADMIN</h5></div>
    <nav class="mt-3">
        <a onclick="show('dash')" id="n-dash" class="nav-link active">📊 Monitoring</a>
        <a onclick="show('bank')" id="n-bank" class="nav-link">📝 Bank Soal</a>
        <a onclick="show('siswa')" id="n-siswa" class="nav-link">👥 Data Siswa</a>
        <a onclick="show('set')" id="n-set" class="nav-link">⚙️ Pengaturan</a>
        <a href="index.html" class="nav-link text-warning">🚪 Keluar</a>
    </nav>
</div>

<div class="content">
    <div id="p-bank" class="hidden">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold m-0">Manajemen Soal (Multi Type)</h4>
            <button onclick="downloadTemplate()" class="btn btn-outline-success fw-bold">📥 Unduh Template Excel</button>
        </div>
        <div class="card p-4">
            <div class="row g-3">
                <div class="col-md-3"><label class="small fw-bold">Mapel</label><input type="text" id="bs-mapel" class="form-control"></div>
                <div class="col-md-2"><label class="small fw-bold">Kelas</label><input type="text" id="bs-kelas" class="form-control"></div>
                <div class="col-md-2"><label class="small fw-bold">Durasi (Menit)</label><input type="number" id="bs-durasi" class="form-control"></div>
                <div class="col-md-3"><label class="small fw-bold">File Excel</label><input type="file" id="bs-file" class="form-control" accept=".xlsx"></div>
                <div class="col-md-2"><label class="small fw-bold">Tampil Nilai?</label><select id="bs-show-nilai" class="form-select"><option value="ya">Ya</option><option value="tidak">Tidak</option></select></div>
                <div class="col-12"><button onclick="uploadSoal()" class="btn btn-primary w-100 fw-bold">UPLOAD SOAL</button></div>
            </div>
        </div>
        <div class="card p-0 overflow-hidden"><table class="table text-center"><tbody id="t-soal"></tbody></table></div>
    </div>

    <div id="p-dash">
        <h4 class="fw-bold mb-4">Monitoring</h4>
        <div class="card p-4 mb-4">
            <div class="row g-2">
                <div class="col-md-4"><select id="f-mapel" class="form-select"></select></div>
                <div class="col-md-4"><select id="f-kelas" class="form-select"></select></div>
                <div class="col-md-4"><button onclick="renderMonitoring()" class="btn btn-primary w-100">Tampilkan</button></div>
            </div>
        </div>
        <div class="card p-0 overflow-hidden"><table class="table"><tbody id="list-hasil-body"></tbody></table></div>
    </div>
    
    <div id="p-siswa" class="hidden">
        <h4 class="fw-bold mb-4">Siswa</h4>
        <div class="card p-4"><input type="file" id="s-file" class="form-control mb-2" accept=".xlsx"><button onclick="uploadSiswa()" class="btn btn-dark w-100">Import Siswa</button></div>
        <div class="card mt-3 p-0 overflow-hidden"><table class="table"><tbody id="t-siswa"></tbody></table></div>
    </div>

    <div id="p-set" class="hidden">
        <h4 class="fw-bold mb-4">Pengaturan</h4>
        <div class="card p-4">
            <input type="text" id="set-nama" class="form-control mb-2" placeholder="Nama Sekolah">
            <input type="text" id="set-judul" class="form-control mb-2" placeholder="Nama Aplikasi">
            <input type="text" id="set-logo" class="form-control mb-2" placeholder="Link Logo">
            <textarea id="set-curang" class="form-control mb-2" placeholder="Pesan Curang"></textarea>
            <button onclick="saveSettings()" class="btn btn-primary w-100">Simpan</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBGl1WySSrPU_86T0SOKi0FhpMdAw8NXLs", databaseURL: "https://cbt-v1-c3387-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function show(p) {
        ['dash','bank','siswa','set'].forEach(i => document.getElementById('p-'+i).classList.add('hidden'));
        document.getElementById('p-'+p).classList.remove('hidden');
    }

    function downloadTemplate() {
        const data = [
            ["pertanyaan", "opsi_a", "opsi_b", "opsi_c", "opsi_d", "kunci", "tipe"],
            ["Ibu kota Indonesia adalah...", "Jakarta", "Bandung", "Medan", "Surabaya", "A", "pg"],
            ["Pilih kota di Pulau Jawa (Bisa pilih > 1)", "Jakarta", "Bandung", "Medan", "Makassar", "A,B", "pgk"],
            ["Matahari terbit dari Barat", "Benar", "Salah", "-", "-", "Salah", "bs"],
            ["Sebutkan gambar ini: <br><img src='https://placehold.co/200' width='200'>", "Kotak", "Bulat", "Segitiga", "Garis", "A", "pg"]
        ];
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet(data);
        XLSX.utils.book_append_sheet(wb, ws, "Soal");
        XLSX.writeFile(wb, "Template_Soal_CBT_Lengkap.xlsx");
    }

    function uploadSoal() {
        const f = document.getElementById('bs-file').files[0];
        if(!f) return;
        const reader = new FileReader();
        reader.onload = e => {
            const data = new Uint8Array(e.target.result), wb = XLSX.read(data, {type:'array'}), json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            db.ref('bank_soal').push({
                mapel: document.getElementById('bs-mapel').value,
                kelas: document.getElementById('bs-kelas').value,
                durasi: document.getElementById('bs-durasi').value,
                showNilai: document.getElementById('bs-show-nilai').value,
                soal: json, status: "aktif"
            }).then(() => Swal.fire('Berhasil','Soal Aktif!','success'));
        };
        reader.readAsArrayBuffer(f);
    }

    // Monitoring & Siswa Sync
    db.ref('bank_soal').on('value', snap => {
        let h = ""; snap.forEach(c => { const v = c.val(); h += `<tr><td>${v.mapel} (${v.kelas})</td><td><button onclick="db.ref('bank_soal/${c.key}').remove()" class="btn btn-danger btn-sm">Hapus</button></td></tr>`; });
        document.getElementById('t-soal').innerHTML = h;
    });

    db.ref('siswa').on('value', snap => {
        let h = ""; snap.forEach(c => { const v = c.val(); h += `<tr><td>${v.nama}</td><td>${v.status}</td><td><button onclick="db.ref('siswa/${c.key}').update({status:'aktif'})" class="btn btn-sm btn-success">Aktifkan</button></td></tr>`; });
        document.getElementById('t-siswa').innerHTML = h;
    });

    function saveSettings() {
        db.ref('pengaturan').set({
            nama_sekolah: document.getElementById('set-nama').value,
            judul_app: document.getElementById('set-judul').value,
            logo_url: document.getElementById('set-logo').value,
            pesan_curang: document.getElementById('set-curang').value
        }).then(() => Swal.fire('Ok','Tersimpan','success'));
    }
</script>
</body>
</html>
