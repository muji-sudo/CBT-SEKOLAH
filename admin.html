<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT PRO - Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #1e3a8a; }
        body { background: #f8fafc; font-family: 'Inter', sans-serif; }
        .sidebar { background: var(--primary); color: white; min-height: 100vh; width: 260px; position: fixed; z-index: 1000; }
        .content { margin-left: 260px; padding: 30px; }
        .nav-link { color: #cbd5e1; cursor: pointer; padding: 12px 20px; border-radius: 8px; margin: 5px 15px; display: block; text-decoration: none; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.1); color: white; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 20px; }
        .hidden { display: none; }
        .btn-xs { padding: 0.1rem 0.4rem; font-size: 0.75rem; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="p-4 text-center">
        <div class="bg-warning text-blue-900 d-inline-block px-3 py-1 rounded fw-bold mb-2">CBT PRO</div>
        <h6 id="sidebar-sekolah" class="fw-bold text-white small">Administrator</h6>
    </div>
    <nav class="mt-3">
        <a onclick="show('dash')" id="n-dash" class="nav-link active">📊 Monitoring</a>
        <a onclick="show('hasil')" id="n-hasil" class="nav-link">📝 Hasil Ujian</a>
        <a onclick="show('bank')" id="n-bank" class="nav-link">📚 Bank Soal</a>
        <a onclick="show('siswa')" id="n-siswa" class="nav-link">👥 Data Siswa</a>
        <a onclick="show('set')" id="n-set" class="nav-link">⚙️ Pengaturan</a>
        <hr class="mx-3 text-white-50">
        <a href="index.html" class="nav-link text-warning">🚪 Keluar</a>
    </nav>
</div>

<div class="content">
    <div id="p-dash">
        <h4 class="fw-bold mb-4">Monitoring Real-Time</h4>
        <div class="card p-3 mb-3">
            <div class="row g-2">
                <div class="col-md-5"><select id="mon-f-kelas" class="form-select select-kelas-smp"></select></div>
                <div class="col-md-5"><select id="mon-f-mapel" class="form-select"><option value="">-- Semua Mapel --</option></select></div>
                <div class="col-md-2"><button onclick="renderMonitoring()" class="btn btn-primary w-100 fw-bold">TAMPILKAN</button></div>
            </div>
        </div>
        <div class="card p-0 overflow-hidden">
            <table class="table table-hover mb-0">
                <thead><tr class="table-light"><th>Nama</th><th>Kelas</th><th>Status</th><th>Pelanggaran</th><th>Aksi</th></tr></thead>
                <tbody id="list-monitoring"></tbody>
            </table>
        </div>
    </div>

    <div id="p-hasil" class="hidden">
        <h4 class="fw-bold mb-4">Hasil Ujian <span id="count-hasil" class="badge bg-secondary fs-6">0</span></h4>
        <div class="card p-3 mb-3">
            <div class="row g-2">
                <div class="col-md-4"><select id="f-kelas" class="form-select select-kelas-smp"></select></div>
                <div class="col-md-4"><select id="f-mapel" class="form-select"><option value="">-- Pilih Mapel --</option></select></div>
                <div class="col-md-2"><button onclick="renderHasil()" class="btn btn-primary w-100 fw-bold">CARI DATA</button></div>
                <div class="col-md-2"><button onclick="exportHasil()" class="btn btn-success w-100 fw-bold">UNDUH EXCEL</button></div>
            </div>
        </div>
        <div class="card p-0 overflow-hidden">
            <table class="table table-striped mb-0" id="table-hasil">
                <thead class="table-dark"><tr><th>Nama</th><th>Kelas</th><th>Mapel</th><th>Nilai</th><th>Waktu</th><th>Aksi</th></tr></thead>
                <tbody id="list-hasil"></tbody>
            </table>
        </div>
    </div>

    <div id="p-siswa" class="hidden">
        <h4 class="fw-bold mb-4">Manajemen Siswa (SMP)</h4>
        <div class="card p-4 mb-4">
            <div class="row g-2 mb-3">
                <div class="col-md-3"><input type="text" id="m-nama" class="form-control" placeholder="Nama Lengkap"></div>
                <div class="col-md-2"><select id="m-kelas" class="form-control select-kelas-smp"></select></div>
                <div class="col-md-3"><input type="text" id="m-user" class="form-control" placeholder="User Login"></div>
                <div class="col-md-2"><input type="text" id="m-pass" class="form-control" placeholder="Password"></div>
                <div class="col-md-2"><button onclick="addManualSiswa()" class="btn btn-primary w-100">Tambah</button></div>
            </div>
            <hr>
            <div class="bg-light p-3 rounded-3">
                <label class="fw-bold mb-2">Import Masal via Excel</label>
                <div class="input-group">
                    <input type="file" id="s-file" class="form-control" accept=".xlsx, .xls">
                    <button onclick="uploadSiswa()" class="btn btn-dark">PROSES IMPORT</button>
                </div>
            </div>
        </div>
        <div class="card p-0 overflow-hidden">
            <table class="table mb-0"><thead class="table-light"><tr><th>Nama</th><th>Kelas</th><th>Login</th><th>Aksi</th></tr></thead><tbody id="t-siswa"></tbody></table>
        </div>
    </div>

    <div id="p-bank" class="hidden">
        <h4 class="fw-bold mb-4">Bank Soal</h4>
        <div class="card p-4">
            <div class="row g-3">
                <div class="col-md-4"><input type="text" id="bs-mapel" class="form-control" placeholder="Mata Pelajaran"></div>
                <div class="col-md-2"><select id="bs-kelas" class="form-select select-kelas-smp"></select></div>
                <div class="col-md-2"><input type="number" id="bs-durasi" class="form-control" placeholder="Menit"></div>
                <div class="col-md-2"><input type="date" id="bs-tgl" class="form-control"></div>
                <div class="col-md-2">
                    <select id="bs-show-nilai" class="form-select">
                        <option value="ya">Tampil Nilai</option>
                        <option value="tidak">Sembunyi</option>
                    </select>
                </div>
                <div class="col-12"><input type="file" id="bs-file" class="form-control" accept=".xlsx"></div>
                <div class="col-12"><button onclick="uploadSoal()" class="btn btn-primary w-100 fw-bold">UPLOAD BANK SOAL</button></div>
            </div>
        </div>
        <div class="card p-0 mt-3 overflow-hidden">
            <table class="table mb-0"><thead class="table-dark"><tr><th>Mapel</th><th>Kelas</th><th>Tanggal</th><th>Status</th><th>Aksi</th></tr></thead><tbody id="t-soal"></tbody></table>
        </div>
    </div>

    <div id="p-set" class="hidden">
        <h4 class="fw-bold mb-4">Pengaturan Sistem</h4>
        <div class="card p-4">
            <div class="row g-3">
                <div class="col-md-6"><label class="fw-bold">Nama Sekolah</label><input type="text" id="set-sekolah" class="form-control"></div>
                <div class="col-md-6"><label class="fw-bold">Nama Aplikasi</label><input type="text" id="set-app" class="form-control"></div>
                <div class="col-12"><label class="fw-bold">URL Logo</label><input type="text" id="set-logo" class="form-control"></div>
                <div class="col-12"><label class="fw-bold">Pesan Pelanggaran</label><textarea id="set-pesan" class="form-control" rows="3"></textarea></div>
                <div class="col-12"><button onclick="simpanPengaturan()" class="btn btn-primary w-100 fw-bold">SIMPAN PERUBAHAN</button></div>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBGl1WySSrPU_86T0SOKi0FhpMdAw8NXLs", databaseURL: "https://cbt-v1-c3387-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const LIST_KELAS_SMP = ["VII-A", "VII-B", "VII-C", "VII-D", "VII-E", "VIII-A", "VIII-B", "VIII-C", "VIII-D", "VIII-E", "IX-A", "IX-B", "IX-C", "IX-D", "IX-E"];
    let dataSiswaGlobal = [], dataHasilGlobal = [];

    function initKelas() {
        document.querySelectorAll('.select-kelas-smp').forEach(el => {
            let h = `<option value="">-- Pilih Kelas --</option>`;
            LIST_KELAS_SMP.forEach(k => h += `<option value="${k}">${k}</option>`);
            el.innerHTML = h;
        });
    }
    window.onload = initKelas;

    function show(p) {
        ['dash','hasil','bank','siswa','set'].forEach(i => { 
            document.getElementById('p-'+i).classList.add('hidden'); 
            document.getElementById('n-'+i).classList.remove('active'); 
        });
        document.getElementById('p-'+p).classList.remove('hidden'); 
        document.getElementById('n-'+p).classList.add('active');
    }

    // PENGATURAN
    db.ref('pengaturan').on('value', snap => {
        const d = snap.val();
        if(d) {
            document.getElementById('set-sekolah').value = d.nama_sekolah || "";
            document.getElementById('set-app').value = d.nama_aplikasi || "";
            document.getElementById('set-logo').value = d.logo_url || "";
            document.getElementById('set-pesan').value = d.pesan_curang || "";
            document.getElementById('sidebar-sekolah').innerText = d.nama_sekolah || "Administrator";
        }
    });

    function simpanPengaturan() {
        db.ref('pengaturan').update({
            nama_sekolah: document.getElementById('set-sekolah').value,
            nama_aplikasi: document.getElementById('set-app').value,
            logo_url: document.getElementById('set-logo').value,
            pesan_curang: document.getElementById('set-pesan').value
        }).then(() => Swal.fire('Ok', 'Pengaturan disimpan', 'success'));
    }

    // MONITORING
    function renderMonitoring() {
        const fk = document.getElementById('mon-f-kelas').value;
        const fm = document.getElementById('mon-f-mapel').value;
        if(!fk) return Swal.fire('Pilih Kelas', '', 'info');
        let h = "";
        dataSiswaGlobal.filter(s => s.kelas === fk).forEach(s => {
            const selesai = dataHasilGlobal.some(d => d.nama === s.nama && d.kelas === s.kelas && (fm==="" || d.mapel === fm));
            let st = s.status === 'curang' ? '<span class="badge bg-danger">CURANG</span>' : (selesai ? '<span class="badge bg-success">SELESAI</span>' : '<span class="badge bg-primary">AKTIF</span>');
            h += `<tr><td>${s.nama}</td><td>${s.kelas}</td><td>${st}</td><td>${s.waktu_curang || '-'}</td><td><button onclick="resetSiswa('${s.key}')" class="btn btn-xs btn-warning fw-bold">RESET</button></td></tr>`;
        });
        document.getElementById('list-monitoring').innerHTML = h || '<tr><td colspan="5" class="text-center">Data Kosong</td></tr>';
    }

    function resetSiswa(key) {
        db.ref('siswa/' + key).update({ status: 'aktif', waktu_curang: null }).then(() => { Swal.fire('Reset!', '', 'success'); renderMonitoring(); });
    }

    // HASIL UJIAN (FIXED SEARCH)
    function renderHasil() {
        const fk = document.getElementById('f-kelas').value;
        const fm = document.getElementById('f-mapel').value;
        
        if(!fk || !fm) return Swal.fire('Lengkapi Filter', 'Pilih Kelas dan Mata Pelajaran', 'warning');

        let h = "", count = 0;
        // Filter data hasil berdasarkan pilihan user
        const filtered = dataHasilGlobal.filter(d => d.kelas === fk && d.mapel === fm);

        if(filtered.length === 0) {
            h = `<tr><td colspan="6" class="text-center py-4 text-muted">Data ujian belum ditemukan untuk filter ini.</td></tr>`;
        } else {
            filtered.forEach(v => {
                count++;
                h += `<tr>
                    <td>${v.nama}</td>
                    <td>${v.kelas}</td>
                    <td>${v.mapel}</td>
                    <td><b class="text-primary">${v.nilai}</b></td>
                    <td><small>${v.waktu}</small></td>
                    <td><button onclick="hapusHasil('${v.key}')" class="btn btn-xs btn-danger">HAPUS</button></td>
                </tr>`;
            });
        }
        document.getElementById('list-hasil').innerHTML = h;
        document.getElementById('count-hasil').innerText = count;
    }

    function hapusHasil(key) {
        Swal.fire({ title: 'Hapus Hasil?', text: "Data nilai siswa ini akan hilang permanen!", icon: 'warning', showCancelButton: true }).then(res => {
            if(res.isConfirmed) db.ref('hasil/' + key).remove().then(() => { Swal.fire('Terhapus', '', 'success'); renderHasil(); });
        });
    }

    function exportHasil() {
        const t = document.getElementById("table-hasil");
        if(dataHasilGlobal.length === 0) return Swal.fire('Data Kosong', '', 'warning');
        XLSX.writeFile(XLSX.utils.table_to_book(t), `Hasil_CBT_${document.getElementById('f-mapel').value}.xlsx`);
    }

    // BANK SOAL
    function uploadSoal() {
        const m = document.getElementById('bs-mapel').value, k = document.getElementById('bs-kelas').value, d = document.getElementById('bs-durasi').value, t = document.getElementById('bs-tgl').value, sn = document.getElementById('bs-show-nilai').value, file = document.getElementById('bs-file').files[0];
        if(!m || !k || !file) return Swal.fire('Error', 'Lengkapi data', 'error');
        const reader = new FileReader();
        reader.onload = (e) => {
            const wb = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
            const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            const soalFormat = json.map(x => ({ pertanyaan: x.pertanyaan, gambar: x.url_gambar || "", opsi_a: x.opsi_a, opsi_b: x.opsi_b, opsi_c: x.opsi_c, opsi_d: x.opsi_d, kunci: x.kunci, tipe: x.tipe_soal || "pilihan_ganda" }));
            db.ref('bank_soal').push({ mapel: m, kelas: k, durasi: d, tanggal: t, showNilai: sn, soal: soalFormat, status: "aktif" }).then(() => Swal.fire('Berhasil', 'Bank Soal diupload', 'success'));
        };
        reader.readAsArrayBuffer(file);
    }

    // REAL-TIME LISTENERS
    db.ref('siswa').on('value', snap => {
        dataSiswaGlobal = []; let h = "";
        snap.forEach(c => { const v = c.val(); v.key = c.key; dataSiswaGlobal.push(v); h += `<tr><td>${v.nama}</td><td>${v.kelas}</td><td>${v.username}</td><td><button onclick="db.ref('siswa/${v.key}').remove()" class="btn btn-xs btn-danger">Hapus</button></td></tr>`; });
        document.getElementById('t-siswa').innerHTML = h;
    });

    db.ref('hasil').on('value', snap => {
        dataHasilGlobal = [];
        snap.forEach(c => { dataHasilGlobal.push({...c.val(), key: c.key}); });
        // Jika sedang di halaman hasil, auto refresh tabel
        if(!document.getElementById('p-hasil').classList.contains('hidden')) renderHasil();
    });

    db.ref('bank_soal').on('value', snap => {
        let h = ""; let mapels = new Set();
        snap.forEach(c => {
            const v = c.val(); v.key = c.key; mapels.add(v.mapel);
            h += `<tr><td>${v.mapel}</td><td>${v.kelas}</td><td>${v.tanggal}</td><td><span class="badge bg-success">${v.status}</span></td><td><button onclick="db.ref('bank_soal/${v.key}').remove()" class="btn btn-xs btn-danger">Hapus</button></td></tr>`;
        });
        document.getElementById('t-soal').innerHTML = h;
        const drops = [document.getElementById('mon-f-mapel'), document.getElementById('f-mapel')];
        drops.forEach(el => {
            let opt = `<option value="">-- Pilih Mapel --</option>`;
            Array.from(mapels).sort().forEach(m => opt += `<option value="${m}">${m}</option>`);
            el.innerHTML = opt;
        });
    });
</script>
</body>
</html>
