<div class="alert alert-warning d-flex justify-content-between align-items-center shadow-sm">
    <span>Gunakan format Excel standar untuk mengupload soal.</span>
    <button onclick="downloadTemplateSoal()" class="btn btn-sm btn-success fw-bold">📥 Download Template Excel</button>
</div>

<script>
// Fungsi Download Template Excel (No, Pertanyaan, Gambar, Opsi A-D, Kunci)
function downloadTemplateSoal() {
    const data = [
        ["NO", "PERTANYAAN", "URL_GAMBAR", "OPSI_A", "OPSI_B", "OPSI_C", "OPSI_D", "KUNCI", "JENIS"],
        [1, "Apa warna bendera Indonesia?", "", "Merah Putih", "Biru Putih", "Kuning", "Hijau", "A", "PG"]
    ];
    const ws = XLSX.utils.aoa_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Template_Soal");
    XLSX.writeFile(wb, "Template_Soal_CBT_SENSEI.xlsx");
}

// Fungsi Mengaktifkan Kembali Siswa yang Terblokir (Curang)
function aktifkanSiswa(key) {
    db.ref('siswa/' + key).update({ status: 'aktif' })
    .then(() => Swal.fire('Berhasil', 'Akun siswa telah diaktifkan kembali', 'success'));
}

// Update Render Tabel Siswa agar terlihat siapa yang Terblokir
db.ref('siswa').on('value', snap => {
    let h = ""; snap.forEach(c => {
        const v = c.val();
        const statusBadge = v.status === 'blokir' ? '<span class="badge bg-danger">CURANG / BLOKIR</span>' : '<span class="badge bg-success">Aktif</span>';
        const btnAktif = v.status === 'blokir' ? `<button onclick="aktifkanSiswa('${c.key}')" class="btn btn-xs btn-warning">Aktifkan Lagi</button>` : '';
        
        h += `<tr>
            <td><b>${v.nama}</b><br>${statusBadge}</td>
            <td>${v.kelas}</td>
            <td>${v.username} / ${v.sandi}</td>
            <td>${btnAktif} <button onclick="db.ref('siswa/${c.key}').remove()" class="btn btn-sm btn-outline-danger">x</button></td>
        </tr>`;
    });
    document.getElementById('t-siswa').innerHTML = h;
});
</script>
