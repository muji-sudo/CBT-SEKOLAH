<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="web-title">CBT LOGIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .input-focus:focus { border-color: #2563eb; ring: 4px; ring-color: #dbeafe; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md text-center border border-slate-200">
        <img id="logo-img" src="" class="h-24 mx-auto mb-4 hidden object-contain">
        <h1 class="text-2xl font-black text-slate-800 tracking-tight" id="sekolah-nama">CBT PRO</h1>
        <p class="text-slate-500 mb-8 font-medium" id="judul-ujian">Silakan login untuk memulai ujian</p>
        
        <div class="space-y-5 text-left">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2 px-1">Username</label>
                <input type="text" id="username" 
                    class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition-all" 
                    placeholder="Masukkan username">
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2 px-1">Password</label>
                <div class="relative">
                    <input type="password" id="password" 
                        class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition-all" 
                        placeholder="Masukkan password">
                    
                    <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-blue-600 transition">
                        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>
            </div>

            <button onclick="login()" 
                class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg shadow-blue-200 hover:bg-blue-700 active:scale-95 transition-all mt-4 tracking-widest">
                MASUK SEKARANG
            </button>
        </div>

        <p class="mt-8 text-xs text-slate-400 font-medium tracking-tighter">© 2024 CBT PRO SYSTEM • ALL RIGHTS RESERVED</p>
    </div>

    <script>
        // CONFIG FIREBASE
        const firebaseConfig = { 
            apiKey: "AIzaSyBGl1WySSrPU_86T0SOKi0FhpMdAw8NXLs", 
            databaseURL: "https://cbt-v1-c3387-default-rtdb.asia-southeast1.firebasedatabase.app" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // LOAD PENGATURAN (Logo & Nama)
        db.ref('pengaturan').on('value', snap => {
            const d = snap.val();
            if(d) {
                document.getElementById('sekolah-nama').innerText = d.nama_sekolah || "CBT PRO";
                document.getElementById('judul-ujian').innerText = d.judul_app || "Ujian Online";
                document.title = d.judul_app || "CBT LOGIN";
                if(d.logo_url) { 
                    const img = document.getElementById('logo-img');
                    img.src = d.logo_url; 
                    img.classList.remove('hidden'); 
                }
            }
        });

        // FUNGSI LIHAT PASSWORD
        function togglePassword() {
            const pInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            
            if (pInput.type === "password") {
                pInput.type = "text";
                // Ikon mata coret (hide)
                eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />`;
            } else {
                pInput.type = "password";
                // Ikon mata normal (show)
                eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />`;
            }
        }

        // FUNGSI LOGIN
        function login() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            
            if(!u || !p) return Swal.fire('Opps!','Isi Username & Password','warning');
            
            Swal.fire({ title: 'Menghubungkan...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            db.ref('siswa').once('value', snap => {
                let userValid = null;
                snap.forEach(c => {
                    const d = c.val();
                    if(String(d.username) === u && String(d.sandi) === p) {
                        userValid = {...d, key: c.key};
                    }
                });

                if(userValid) {
                    if(userValid.status === 'blokir') {
                        return Swal.fire('AKSES DITOLAK','Akun Anda diblokir karena terdeteksi curang!','error');
                    }
                    sessionStorage.setItem('siswa_aktif', JSON.stringify(userValid));
                    window.location.href = "ujian.html";
                } else {
                    Swal.fire('Gagal','Username atau Password salah!','error');
                }
            });
        }
    </script>
</body>
</html>
