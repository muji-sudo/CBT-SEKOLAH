<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="web-title">CBT PRO - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md border border-slate-200">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight" id="sekolah-nama">CBT LOGIN</h1>
            <p class="text-slate-500 mt-2 font-medium" id="judul-ujian">Silakan masuk untuk memulai ujian</p>
        </div>
        <div class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2 px-1">Username</label>
                <input type="text" id="username" class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition-all outline-none" placeholder="Username">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2 px-1">Password</label>
                <input type="password" id="password" class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition-all outline-none" placeholder="Password">
            </div>
            <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-extrabold py-4 rounded-2xl shadow-lg shadow-blue-200 transform transition active:scale-95">MASUK SEKARANG</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBGl1WySSrPU_86T0SOKi0FhpMdAw8NXLs", databaseURL: "https://cbt-v1-c3387-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('pengaturan').on('value', snap => {
            const d = snap.val();
            if(d) {
                document.getElementById('sekolah-nama').innerText = d.nama_sekolah || "CBT PRO";
                document.getElementById('judul-ujian').innerText = d.judul_app || "Ujian Online";
            }
        });

        function login() {
            const userIn = document.getElementById('username').value.trim();
            const passIn = document.getElementById('password').value.trim();
            if(!userIn || !passIn) return Swal.fire('Opps!','Isi Username & Password','warning');

            db.ref('siswa').once('value', snap => {
                let userValid = null;
                let isBlokir = false;

                snap.forEach(child => {
                    const data = child.val();
                    if(String(data.username) === userIn && String(data.sandi) === passIn) {
                        if(data.status === 'blokir') {
                            isBlokir = true;
                        } else {
                            userValid = {...data, key: child.key};
                        }
                    }
                });

                if(isBlokir) {
                    Swal.fire('Akses Ditolak', 'Akun Anda DIBLOKIR karena terdeteksi curang!', 'error');
                } else if(userValid) {
                    sessionStorage.setItem('siswa_aktif', JSON.stringify(userValid));
                    window.location.href = "ujian.html";
                } else {
                    Swal.fire('Gagal', 'Username atau Password salah!', 'error');
                }
            });
        }
    </script>
</body>
</html>
