<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="web-title">CBT LOGIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md text-center">
        <img id="logo-img" src="" class="h-20 mx-auto mb-4 hidden">
        <h1 class="text-2xl font-bold text-slate-800" id="sekolah-nama">CBT PRO</h1>
        <p class="text-slate-500 mb-8" id="judul-ujian">Silakan Login</p>
        
        <div class="space-y-4 text-left">
            <input type="text" id="username" class="w-full px-5 py-3 bg-slate-50 border rounded-xl outline-none" placeholder="Username">
            <input type="password" id="password" class="w-full px-5 py-3 bg-slate-50 border rounded-xl outline-none" placeholder="Password">
            <button onclick="login()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition">MASUK</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBGl1WySSrPU_86T0SOKi0FhpMdAw8NXLs", databaseURL: "https://cbt-v1-c3387-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('pengaturan').on('value', snap => {
            const d = snap.val();
            if(d) {
                document.getElementById('sekolah-nama').innerText = d.nama_sekolah;
                document.getElementById('judul-ujian').innerText = d.judul_app;
                document.title = d.judul_app;
                if(d.logo_url) { document.getElementById('logo-img').src = d.logo_url; document.getElementById('logo-img').classList.remove('hidden'); }
            }
        });

        function login() {
            const u = document.getElementById('username').value, p = document.getElementById('password').value;
            db.ref('siswa').once('value', snap => {
                let userValid = null;
                snap.forEach(c => {
                    const d = c.val();
                    if(d.username === u && d.sandi === p) userValid = {...d, key: c.key};
                });

                if(userValid) {
                    if(userValid.status === 'blokir') return Swal.fire('DIBLOKIR','Akun Anda dinonaktifkan karena curang!','error');
                    sessionStorage.setItem('siswa_aktif', JSON.stringify(userValid));
                    window.location.href = "ujian.html";
                } else {
                    Swal.fire('Gagal','User/Pass Salah','error');
                }
            });
        }
    </script>
</body>
</html>
