<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT PRO - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md text-center border-t-8 border-blue-900">
        <img id="display-logo" src="" class="w-24 mx-auto mb-4">
        <h2 id="display-nama" class="text-2xl font-black text-blue-900 leading-tight">CBT SYSTEM</h2>
        <p id="display-judul" class="text-slate-500 text-sm mb-8 font-bold"></p>
        
        <div class="space-y-4 text-left">
            <input type="text" id="user" class="w-full px-4 py-4 rounded-2xl border-2 outline-none focus:border-blue-600" placeholder="Username">
            <div class="relative">
                <input type="password" id="pass" class="w-full px-4 py-4 rounded-2xl border-2 outline-none focus:border-blue-600" placeholder="Password">
                <button type="button" onclick="togglePass()" class="absolute right-4 top-4 text-slate-400">👁️</button>
            </div>
            <button onclick="login()" class="w-full bg-blue-900 text-white font-black py-4 rounded-2xl shadow-lg">MASUK</button>
        </div>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBGl1WySSrPU_86T0SOKi0FhpMdAw8NXLs", databaseURL: "https://cbt-v1-c3387-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref('pengaturan').on('value', snap => {
        const d = snap.val();
        if(d) {
            document.getElementById('display-nama').innerText = d.nama_sekolah;
            document.getElementById('display-judul').innerText = d.judul_app;
            document.getElementById('display-logo').src = d.logo_url;
        }
    });

    function togglePass() {
        const p = document.getElementById('pass');
        p.type = p.type === 'password' ? 'text' : 'password';
    }

    function login() {
        const u = document.getElementById('user').value.trim(), p = document.getElementById('pass').value.trim();
        db.ref('siswa').once('value', snap => {
            let user = null;
            snap.forEach(c => { 
                const d = c.val(); 
                if(String(d.username) === u && String(d.sandi) === p) user = d; 
            });

            if(user) {
                if(user.status === 'diblokir') {
                    Swal.fire('AKUN DIBLOKIR','Anda terdeteksi curang sebelumnya. Hubungi Admin.','error');
                } else {
                    sessionStorage.setItem('siswa_aktif', JSON.stringify(user));
                    window.location.href="ujian.html";
                }
            } else {
                Swal.fire('Error','Username/Password Salah','error');
            }
        });
    }
</script>
</body>
</html>
