<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ujian Sedang Berlangsung</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-50 select-none">
    <div id="app" class="max-w-2xl mx-auto p-4 py-8">
        <div id="soal-container" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <h1 class="text-xl font-bold text-blue-900 mb-4">Sedang memuat soal...</h1>
        </div>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBGl1WySSrPU_86T0SOKi0FhpMdAw8NXLs", databaseURL: "https://cbt-v1-c3387-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const siswa = JSON.parse(sessionStorage.getItem('siswa_aktif'));
    if(!siswa) window.location.href = "index.html";

    // FITUR ANTI-CURANG (Auto Block)
    document.addEventListener("visibilitychange", function() {
        if (document.hidden) {
            db.ref('siswa').once('value', snap => {
                snap.forEach(child => {
                    if(child.val().username === siswa.username) {
                        db.ref('siswa/' + child.key).update({ status: 'blokir' });
                    }
                });
            });
            Swal.fire({
                title: 'ANDA DIBLOKIR!',
                text: 'Terdeteksi keluar dari halaman ujian.',
                icon: 'error',
                allowOutsideClick: false
            }).then(() => {
                sessionStorage.clear();
                window.location.href = "index.html";
            });
        }
    });

    // Simpan hasil dengan Detail Jawaban untuk Analisis di Admin
    function finishExam(score, detail) {
        db.ref('hasil').push({
            nama: siswa.nama,
            kelas: siswa.kelas,
            nilai: score,
            detail_jawaban: detail, 
            waktu: new Date().toLocaleString()
        }).then(() => {
            Swal.fire('Selesai','Ujian telah dikirim','success').then(()=>window.location.href="index.html");
        });
    }
</script>
</body>
</html>
