<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT UJIAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-50 min-h-screen select-none">

    <div id="box-curang" class="hidden fixed inset-0 bg-red-700 z-[9999] flex flex-col items-center justify-center text-center p-6 text-white">
        <h1 class="text-5xl font-black mb-4">CURANG TERDETEKSI!</h1>
        <p id="pesan-curang-display" class="text-xl italic mb-6"></p>
        <button onclick="window.location.href='index.html'" class="bg-white text-red-700 px-8 py-3 rounded-full font-bold">LOGOUT</button>
    </div>

    <div id="wrapper-ujian" class="p-4 max-w-3xl mx-auto mt-10">
        <div class="bg-white p-6 rounded-2xl shadow-lg">
            <h2 id="mapel" class="text-2xl font-bold border-b pb-4 mb-6">Memuat Ujian...</h2>
            <div id="konten-soal" class="space-y-8"></div>
            <button onclick="selesai()" class="w-full bg-green-600 text-white font-bold py-4 rounded-2xl mt-10">SELESAI & KIRIM</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBGl1WySSrPU_86T0SOKi0FhpMdAw8NXLs", databaseURL: "https://cbt-v1-c3387-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const siswa = JSON.parse(sessionStorage.getItem('siswa_aktif'));
        if(!siswa) window.location.href = "index.html";

        let isAktif = true, soalData = [], jawaban = {}, namaMapel = "";

        // PENGATURAN & ANTI CURANG
        db.ref('pengaturan').on('value', snap => {
            if(snap.val()) document.getElementById('pesan-curang-display').innerText = snap.val().pesan_curang;
        });

        window.addEventListener('blur', () => {
            if(isAktif) {
                isAktif = false;
                db.ref('siswa/' + siswa.key).update({ status: 'blokir' });
                document.getElementById('wrapper-ujian').style.display = 'none';
                document.getElementById('box-curang').classList.remove('hidden');
            }
        });

        // LOAD SOAL
        db.ref('bank_soal').once('value', snap => {
            snap.forEach(c => {
                const v = c.val();
                if(v.status === 'aktif' && v.kelas === siswa.kelas) {
                    namaMapel = v.mapel;
                    document.getElementById('mapel').innerText = v.mapel;
                    soalData = v.soal;
                    render();
                }
            });
        });

        function render() {
            let h = "";
            soalData.forEach((s, i) => {
                h += `<div class="p-4 border-l-4 border-blue-500 bg-slate-50 rounded-r-xl">
                    <div class="font-bold text-lg mb-4 text-slate-700">${i+1}. ${s.pertanyaan}</div>
                    <div class="space-y-3">
                        ${['a','b','c','d'].map(opt => `
                            <label class="flex items-center p-3 bg-white border rounded-xl cursor-pointer hover:bg-blue-50 transition">
                                <input type="radio" name="q${i}" onclick="jawaban[${i}]='${opt.toUpperCase()}'" class="w-5 h-5 mr-3">
                                <span>${s['opsi_'+opt]}</span>
                            </label>
                        `).join('')}
                    </div>
                </div>`;
            });
            document.getElementById('konten-soal').innerHTML = h;
        }

        function selesai() {
            isAktif = false;
            let benar = 0;
            soalData.forEach((s, i) => { if(jawaban[i] === s.kunci) benar++; });
            const nilai = Math.round((benar / soalData.length) * 100);

            db.ref('hasil').push({
                nama: siswa.nama, kelas: siswa.kelas, mapel: namaMapel,
                nilai: nilai, waktu: new Date().toLocaleString()
            }).then(() => {
                Swal.fire('Sukses','Ujian Berhasil Dikirim','success').then(() => window.location.href='index.html');
            });
        }
    </script>
</body>
</html>
