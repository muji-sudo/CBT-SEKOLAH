<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT PRO - Ujian</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-50 min-h-screen">

    <div id="box-curang" class="hidden fixed inset-0 bg-red-700 z-[9999] flex flex-col items-center justify-center text-white p-6 text-center">
        <h1 class="text-6xl font-black mb-4">DIBLOKIR!</h1>
        <p id="teks-curang" class="text-xl mb-8"></p>
        <p class="bg-white/20 p-4 rounded-lg mb-8">Akun Anda telah dinonaktifkan secara otomatis. Silakan hubungi pengawas.</p>
        <button onclick="keluarSistem()" class="bg-white text-red-700 font-bold py-3 px-10 rounded-xl">Keluar</button>
    </div>

    <div id="wrapper-ujian">
        <header class="bg-blue-900 text-white p-4 shadow-lg flex justify-between items-center sticky top-0 z-40">
            <div><h2 id="n-siswa" class="font-bold text-sm">...</h2><span id="h-mapel" class="text-[10px] text-yellow-300"></span></div>
            <div id="timer" class="bg-red-600 px-3 py-1 rounded-lg font-mono font-bold">00:00</div>
        </header>

        <main class="container mx-auto p-4 max-w-4xl">
            <div id="box-start" class="bg-white p-8 rounded-3xl shadow-xl text-center mt-4">
                <h3 id="t-mapel" class="text-2xl font-black text-blue-900 mb-6">-</h3>
                <button id="btn-start-action" onclick="startNow()" class="bg-blue-700 text-white w-full py-4 rounded-2xl font-black">MULAI UJIAN</button>
            </div>

            <div id="box-soal" class="hidden mt-4">
                <div class="bg-white rounded-2xl shadow-lg p-6 border">
                    <div id="display-gambar"></div>
                    <div id="soal-teks" class="text-lg mb-6"></div>
                    <div id="opsi-list" class="space-y-3"></div>
                </div>
                <div class="mt-6 flex gap-3">
                    <button id="btn-prev" onclick="nav(-1)" class="w-1/2 bg-white border py-3 rounded-xl font-bold">KEMBALI</button>
                    <button id="btn-next" onclick="nav(1)" class="w-1/2 bg-blue-700 text-white py-3 rounded-xl font-bold">LANJUT</button>
                    <button id="btn-finish" onclick="finish()" class="hidden w-1/2 bg-green-500 text-white py-3 rounded-xl font-black">SELESAI</button>
                </div>
            </div>
        </main>
    </div>

    <div id="box-selesai" class="hidden min-h-screen items-center justify-center p-4 bg-slate-50 flex-col">
        <div class="bg-white p-10 rounded-3xl shadow-2xl text-center max-w-md w-full">
            <h2 class="text-3xl font-black mb-4">Selesai!</h2>
            <div id="box-nilai-final" class="hidden text-5xl font-black text-blue-600 mb-8">0</div>
            <button onclick="keluarSistem()" class="bg-slate-800 text-white font-black py-4 px-10 rounded-2xl w-full">Kembali</button>
        </div>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBGl1WySSrPU_86T0SOKi0FhpMdAw8NXLs", databaseURL: "https://cbt-v1-c3387-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const sData = JSON.parse(sessionStorage.getItem('siswa_aktif'));
    if(!sData) window.location.href="index.html";

    let soalData = [], index = 0, paket = null, jawabanUser = {}, isExamActive = false;

    // CEK STATUS REALTIME (JIKA DIBLOKIR ADMIN SAAT UJIAN)
    db.ref('siswa').orderByChild('username').equalTo(sData.username).on('value', snap => {
        snap.forEach(c => {
            if(c.val().status === 'diblokir') {
                isExamActive = false;
                document.getElementById('wrapper-ujian').classList.add('hidden');
                document.getElementById('box-curang').classList.remove('hidden');
            }
        });
    });

    // FUNGSI BLOKIR OTOMATIS
    function aksiBlokir() {
        if (isExamActive) {
            isExamActive = false;
            db.ref('siswa').orderByChild('username').equalTo(sData.username).once('value', snap => {
                snap.forEach(c => { db.ref('siswa/'+c.key).update({ status: 'diblokir' }); });
            });
        }
    }
    window.addEventListener("blur", aksiBlokir);
    document.addEventListener("visibilitychange", () => { if(document.hidden) aksiBlokir(); });

    // CARI PAKET & CEK APAKAH SUDAH PERNAH KERJA
    db.ref('bank_soal').on('value', snap => {
        const tgl = new Date().toLocaleDateString('en-CA');
        snap.forEach(c => {
            const d = c.val();
            if(d.kelas == sData.kelas && d.tanggal == tgl && d.status == 'aktif') {
                paket = d;
                document.getElementById('t-mapel').innerText = d.mapel;
                document.getElementById('h-mapel').innerText = d.mapel;
                cekSudahUjian(d.mapel);
            }
        });
    });

    function cekSudahUjian(mapel) {
        db.ref('hasil').once('value', snap => {
            snap.forEach(c => {
                const v = c.val();
                if(v.nama == sData.nama && v.mapel == mapel) {
                    document.getElementById('btn-start-action').disabled = true;
                    document.getElementById('btn-start-action').innerText = "ANDA SUDAH SELESAI UJIAN";
                    document.getElementById('btn-start-action').classList.replace('bg-blue-700', 'bg-slate-400');
                }
            });
        });
    }

    function startNow() {
        isExamActive = true;
        document.getElementById('box-start').classList.add('hidden');
        document.getElementById('box-soal').classList.remove('hidden');
        soalData = paket.soal;
        renderSoal();
        startTimer(paket.durasi);
    }

    function renderSoal() {
        const s = soalData[index];
        document.getElementById('soal-teks').innerText = s.pertanyaan || s.PERTANYAAN;
        const img = s.gambar || s.GAMBAR;
        document.getElementById('display-gambar').innerHTML = img ? `<img src="${img}" class="w-full max-h-64 object-contain mb-4">` : "";
        
        let h = "";
        ['a','b','c','d','e'].forEach(o => {
            const txt = s['opsi_'+o] || s['OPSI_'+o.toUpperCase()];
            if(txt) {
                const chk = (jawabanUser[index] == o) ? 'checked' : '';
                h += `<label class="flex items-center p-4 border rounded-xl"><input type="radio" name="ans" value="${o}" ${chk} onchange="jawabanUser[${index}]='${o}'" class="w-5 h-5"><span class="ml-3"><b>${o.toUpperCase()}.</b> ${txt}</span></label>`;
            }
        });
        document.getElementById('opsi-list').innerHTML = h;
        document.getElementById('btn-next').classList.toggle('hidden', index == soalData.length-1);
        document.getElementById('btn-finish').classList.toggle('hidden', index != soalData.length-1);
    }

    function nav(d) { index += d; renderSoal(); }
    function finish() { Swal.fire({title:'Kumpulkan?', showCancelButton:true}).then(r => { if(r.isConfirmed) processScore(); }); }

    function processScore() {
        isExamActive = false;
        let benar = 0;
        soalData.forEach((s, i) => { if(jawabanUser[i] == (s.kunci||s.KUNCI).toLowerCase()) benar++; });
        const nilai = Math.round((benar/soalData.length)*100);
        db.ref('hasil').push({ nama: sData.nama, kelas: sData.kelas, mapel: paket.mapel, nilai: nilai, waktu: new Date().toLocaleString() })
        .then(() => {
            document.getElementById('wrapper-ujian').classList.add('hidden');
            if(paket.showNilai == 'ya') { document.getElementById('box-nilai-final').innerText = nilai; document.getElementById('box-nilai-final').classList.remove('hidden'); }
            document.getElementById('box-selesai').classList.add('flex');
        });
    }

    function startTimer(m) {
        let s = m * 60;
        setInterval(() => {
            let min = Math.floor(s/60), sec = s%60;
            document.getElementById('timer').innerText = `${min}:${sec<10?'0'+sec:sec}`;
            if(s-- <= 0) processScore();
        }, 1000);
    }
    function keluarSistem() { sessionStorage.clear(); window.location.href="index.html"; }
</script>
</body>
</html>
