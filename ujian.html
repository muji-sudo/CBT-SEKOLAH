<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT PRO - Mobile Friendly</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* Desain Khusus Mobile & PC */
        body { font-family: 'Inter', sans-serif; }
        .option-card { border: 2px solid #f1f5f9; cursor: pointer; transition: 0.2s; }
        .option-card:active { transform: scale(0.98); }
        input:checked + .option-content { color: #1e40af; font-weight: 700; }
        @media (max-width: 640px) {
            .btn-nav { width: 100%; margin-bottom: 10px; }
            .nav-container { flex-direction: column-reverse; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen select-none">

    <header class="bg-blue-900 text-white p-3 md:p-4 shadow-lg flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="bg-yellow-400 text-blue-900 font-bold p-1 md:p-2 rounded text-[10px] md:text-xs">CBT</div>
            <div class="overflow-hidden">
                <h2 id="n-siswa" class="font-bold text-yellow-400 text-sm md:text-base truncate w-32 md:w-auto">...</h2>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <div id="timer" class="bg-red-600 px-3 py-1 rounded-lg font-mono font-bold text-sm md:text-xl">00:00</div>
            <button onclick="keluarSistem()" class="text-white bg-blue-800 p-2 rounded-lg"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg></button>
        </div>
    </header>

    <main class="container mx-auto p-4 max-w-4xl">
        <div id="box-start" class="bg-white p-6 md:p-10 rounded-3xl shadow-xl text-center">
            <div id="loading-init"><p class="animate-pulse">Sinkronisasi Jadwal...</p></div>
            
            <div id="ready-ui" class="hidden animate-fade-in">
                <h3 class="text-xl font-bold mb-4">Informasi Ujian</h3>
                <div class="bg-slate-50 p-4 rounded-2xl text-left mb-6">
                    <p class="text-xs text-slate-400 uppercase font-bold">Mata Pelajaran</p>
                    <p id="t-mapel" class="text-lg font-bold text-blue-900">-</p>
                </div>
                <button onclick="startNow()" class="bg-blue-700 text-white w-full py-4 rounded-2xl font-bold shadow-lg">MULAI KERJAKAN</button>
            </div>

            <div id="t-no" class="hidden">
                <div class="bg-red-50 p-6 rounded-2xl mb-4 text-red-600 font-bold">Jadwal ujian belum tersedia atau sudah berakhir.</div>
                <button onclick="keluarSistem()" class="w-full bg-slate-800 text-white py-3 rounded-xl">KELUAR</button>
            </div>
        </div>

        <div id="box-soal" class="hidden">
            <div class="bg-white rounded-2xl shadow-lg border border-slate-200">
                <div class="bg-slate-800 p-3 md:p-4 text-white flex justify-between items-center rounded-t-2xl">
                    <span class="font-bold text-sm">SOAL <span id="no-skrg" class="text-yellow-400 text-xl">1</span></span>
                    <span id="label-tipe" class="text-[9px] md:text-[10px] bg-blue-600 px-3 py-1 rounded-full uppercase font-bold">PG</span>
                </div>
                <div class="p-5 md:p-8">
                    <div id="soal-teks" class="text-base md:text-lg text-slate-800 mb-6 leading-relaxed"></div>
                    <div id="opsi-list" class="space-y-3"></div>
                </div>
            </div>

            <div class="mt-6 flex flex-col md:flex-row gap-3 nav-container">
                <button id="btn-prev" onclick="nav(-1)" class="btn-nav bg-white border-2 border-slate-200 py-3 px-8 rounded-xl font-bold text-slate-600">KEMBALI</button>
                <div class="flex-grow"></div>
                <button id="btn-next" onclick="nav(1)" class="btn-nav bg-blue-700 text-white py-3 px-10 rounded-xl font-bold shadow-lg">SELANJUTNYA</button>
                <button id="btn-finish" onclick="finish()" class="btn-nav hidden bg-green-600 text-white py-3 px-10 rounded-xl font-bold shadow-lg">KUMPULKAN</button>
            </div>
        </div>
    </main>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBGl1WySSrPU_86T0SOKi0FhpMdAw8NXLs", databaseURL: "https://cbt-v1-c3387-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const siswa = JSON.parse(sessionStorage.getItem('siswa_aktif'));
    if(!siswa) window.location.href="index.html";
    document.getElementById('n-siswa').innerText = siswa.nama;

    let soalData = [], index = 0, paket = null, jawabanUser = {};

    db.ref('bank_soal').on('value', snap => {
        const tglSkrg = new Date().toLocaleDateString('en-CA');
        let found = false;
        snap.forEach(child => {
            const d = child.val();
            if((String(d.kelas).toLowerCase() === String(siswa.kelas).toLowerCase() || d.kelas === "Semua") && d.tanggal === tglSkrg && d.status === "aktif") {
                paket = d; found = true;
                document.getElementById('t-mapel').innerText = d.mapel;
                document.getElementById('loading-init').classList.add('hidden');
                document.getElementById('ready-ui').classList.remove('hidden');
            }
        });
        if(!found) { document.getElementById('loading-init').classList.add('hidden'); document.getElementById('t-no').classList.remove('hidden'); }
    });

    function startNow() {
        document.getElementById('box-start').classList.add('hidden');
        document.getElementById('box-soal').classList.remove('hidden');
        soalData = paket.soal.sort(() => Math.random() - 0.5);
        renderSoal();
        startTimer(paket.durasi || 60);
    }

    function renderSoal() {
        const s = soalData[index];
        const tipe = (s.jenis || s.JENIS || "pg").toLowerCase();
        document.getElementById('no-skrg').innerText = index + 1;
        document.getElementById('soal-teks').innerHTML = s.pertanyaan || s.PERTANYAAN;
        document.getElementById('label-tipe').innerText = (tipe === "km") ? "Pilihan Ganda Kompleks" : (tipe === "bs" ? "Benar/Salah" : "Pilihan Ganda");
        
        let html = "";
        ['A','B','C','D','E'].forEach(o => {
            const teksOpsi = s['opsi_'+o.toLowerCase()] || s['OPSI_'+o];
            if(teksOpsi || (tipe === 'bs' && (o === 'A' || o === 'B'))) {
                const checked = (jawabanUser[index] || []).includes(o);
                const inputType = (tipe === "km") ? "checkbox" : "radio";
                html += `
                <label class="option-card flex items-center p-4 rounded-xl bg-white shadow-sm border-2 ${checked?'border-blue-500 bg-blue-50':'border-slate-100'}">
                    <input type="${inputType}" name="q_ans" value="${o}" ${checked?'checked':''} 
                        onchange="saveAnswer('${o}', '${inputType}')" class="w-5 h-5 accent-blue-700">
                    <span class="ml-3 text-slate-700 option-content"><b>${o}.</b> ${teksOpsi || (o==='A'?'BENAR':'SALAH')}</span>
                </label>`;
            }
        });
        document.getElementById('opsi-list').innerHTML = html;
        document.getElementById('btn-prev').style.visibility = (index === 0) ? 'hidden' : 'visible';
        if(index === soalData.length - 1) {
            document.getElementById('btn-next').classList.add('hidden');
            document.getElementById('btn-finish').classList.remove('hidden');
        } else {
            document.getElementById('btn-next').classList.remove('hidden');
            document.getElementById('btn-finish').classList.add('hidden');
        }
    }

    function saveAnswer(val, type) {
        if(!jawabanUser[index]) jawabanUser[index] = [];
        if(type === 'radio') { jawabanUser[index] = [val]; } 
        else {
            if(jawabanUser[index].includes(val)) { jawabanUser[index] = jawabanUser[index].filter(v => v !== val); } 
            else { jawabanUser[index].push(val); }
        }
        renderSoal(); // Refresh tampilan warna card
    }

    function nav(dir) { index += dir; renderSoal(); window.scrollTo(0,0); }

    function startTimer(min) {
        let sec = min * 60;
        const timerObj = setInterval(() => {
            let m = Math.floor(sec / 60), s = sec % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' + s : s}`;
            if(sec <= 0) { clearInterval(timerObj); processScore(); }
            sec--;
        }, 1000);
    }

    function finish() {
        Swal.fire({ title: 'Kumpulkan Sekarang?', text: "Pastikan semua jawaban terisi.", icon: 'question', showCancelButton: true, confirmButtonText: 'Ya, Kirim' }).then((r) => { if (r.isConfirmed) processScore(); });
    }

    function processScore() {
        let benar = 0;
        soalData.forEach((s, i) => {
            const kunci = String(s.kunci || s.KUNCI || "").replace(/\s/g, '').split(',').sort().join(',');
            const ans = (jawabanUser[i] || []).sort().join(',');
            if(ans === kunci && kunci !== "") benar++;
        });
        const nilai = Math.round((benar / soalData.length) * 100);
        
        db.ref('hasil').push({
            nama: siswa.nama, kelas: siswa.kelas, mapel: paket.mapel,
            nilai: nilai, waktu: new Date().toLocaleString()
        }).then(() => {
            // LOGIKA PESAN SESUAI SETTING ADMIN
            let pesan = "Alhamdulillah, jawaban sudah terkirim.";
            if(paket.showNilai === "ya") {
                pesan = "Alhamdulillah Ujian Selesai. Nilai Anda: " + nilai;
            }
            
            Swal.fire({ title: 'Berhasil!', text: pesan, icon: 'success' }).then(() => keluarSistem());
        });
    }

    function keluarSistem() { sessionStorage.clear(); window.location.href = "index.html"; }
</script>
</body>
</html>
