<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT PRO - Ujian</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-50 min-h-screen select-none relative">

    <div id="box-curang" class="hidden fixed inset-0 bg-red-600 z-[9999] flex-col items-center justify-center text-center p-6">
        <h1 class="text-white text-6xl font-black mb-4">TERDETEKSI CURANG!</h1>
        <p class="text-white text-xl" id="pesan-curang">Anda keluar dari halaman ujian. Akun Anda telah DIBLOKIR.</p>
        <button onclick="window.location.href='index.html'" class="mt-8 bg-white text-red-600 px-10 py-4 rounded-full font-bold">KEMBALI KE LOGIN</button>
    </div>

    <div id="wrapper-ujian" class="p-4">
        <div class="max-w-4xl mx-auto bg-white shadow-lg rounded-xl p-6 mt-10">
            <h2 id="display-mapel" class="text-2xl font-bold mb-4">Memuat Soal...</h2>
            <div id="konten-soal" class="space-y-4"></div>
            <button onclick="selesaiUjian()" class="mt-10 w-full bg-green-600 text-white py-4 rounded-xl font-bold">SELESAI UJIAN</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBGl1WySSrPU_86T0SOKi0FhpMdAw8NXLs", databaseURL: "https://cbt-v1-c3387-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const siswa = JSON.parse(sessionStorage.getItem('siswa_aktif'));
        if(!siswa) window.location.href = "index.html";

        let isExamActive = true;
        let soalData = [];
        let jawabanUser = {};

        // DETEKSI CURANG (Pindah Tab)
        window.addEventListener('blur', () => {
            if(isExamActive) {
                isExamActive = false;
                // Update status siswa jadi blokir di Firebase
                db.ref('siswa/' + siswa.key).update({ status: 'blokir' });
                
                document.getElementById('wrapper-ujian').style.display = 'none';
                document.getElementById('box-curang').classList.remove('hidden');
                document.getElementById('box-curang').classList.add('flex');
            }
        });

        // Load Paket Soal
        db.ref('bank_soal').once('value', snap => {
            snap.forEach(c => {
                const p = c.val();
                if(p.status === "aktif") {
                    document.getElementById('display-mapel').innerText = p.mapel;
                    soalData = p.soal;
                    renderSoal();
                }
            });
        });

        function renderSoal() {
            let h = "";
            soalData.forEach((s, i) => {
                h += `<div class="p-4 border rounded-lg">
                    <p class="font-bold mb-2">${i+1}. ${s.pertanyaan}</p>
                    <div class="space-y-2">
                        <label class="block"><input type="radio" name="soal${i}" onclick="jawabanUser[${i}]='A'"> ${s.opsi_a}</label>
                        <label class="block"><input type="radio" name="soal${i}" onclick="jawabanUser[${i}]='B'"> ${s.opsi_b}</label>
                        <label class="block"><input type="radio" name="soal${i}" onclick="jawabanUser[${i}]='C'"> ${s.opsi_c}</label>
                        <label class="block"><input type="radio" name="soal${i}" onclick="jawabanUser[${i}]='D'"> ${s.opsi_d}</label>
                    </div>
                </div>`;
            });
            document.getElementById('konten-soal').innerHTML = h;
        }

        function selesaiUjian() {
            isExamActive = false;
            let benar = 0;
            soalData.forEach((s, i) => {
                if(jawabanUser[i] === s.kunci) benar++;
            });
            const nilai = Math.round((benar / soalData.length) * 100);

            db.ref('hasil').push({
                nama: siswa.nama, kelas: siswa.kelas,
                mapel: document.getElementById('display-mapel').innerText,
                nilai: nilai
            }).then(() => {
                Swal.fire('Berhasil', 'Ujian Selesai! Nilai Anda: ' + nilai, 'success')
                .then(() => window.location.href = "index.html");
            });
        }
    </script>
</body>
</html>
